body:
  text: 益古演假卷下元李冶撰第四十三問今有圓田三假一依古法一依密率一依徽率共計地二十畝五十二步一百七十五分步之二十三只云密徑多於古徑九步徽徑多於密徑九步問三徑各多少答曰古徑三十六步密徑四十五步徽徑五十四步法曰立天元一為古徑加多九步得丨為密徑以自之得下丨為密徑冪又以十一乘之得為十四假密圓積於頭又立天元古徑加二之多步一十八步得丨為徽徑以自之得丨為徽徑冪也又以一百五十七乘之得為二百假徽圓積於中按徽率周一百五十七徑五十徑乘周四歸為圓冪今以徑冪乘周當以徑五十除之再四歸之為圓冪不除便為五十乘之又四乘之之二百圓冪也又置天元古徑以自之又三之得元為四假古圓積於下乃求三積齊同分母而併之先以分母一萬七千五百按此即十四除二十四萬五十之數乘十四假密圓積得為二十四萬五千假密圓積於頭位次以分母一千二百二十五乘二百假徽積得為二十四萬五千假徽積於中位次以分母六萬一千二百五十乘四假古積得為二十四萬五千假古積於下位三位相併得為二十四萬五千假如積數寄左然後列見積通分內子得八十四萬九千一百二十三就分以一千四百乘之得一十一億八千八百七十七萬二千二百與左相消得下式平方開之得三十六步為方徑也各加多步見徽密二徑也義曰所以齊同於二十四萬五千假者以元母一百七十五乘一千四百得此數依條假求之以一千四百乘田積於頭位置徽徑多古徑自之為冪又以一千九十九按置一千四百分以徽圓冪率一百五十七乘之方冪率二百除之即得乘之減頭位續置密徑多古徑自之為冪又以一千一百按置冪十一千四百分以密率圓乘之方冪十四除之即得乘之復減頭位餘為實又倍徽徑多古徑以千九十九乘之為徽從又倍密徑多古徑以一千一百乘之為密從併二從得五萬九千三百六十四為從法亷常置三千二百四十九義曰以一千四百乘積者取其三率皆可以除之也齊同分母須至於二十四萬五千假者蓋以分母一百七十五元乘積數一千四百此二數相乘得二十四萬五千也此問求真積實數古徑三十六得積九百七十二步密徑四十五步得積一千五百九十一步一十四分步之一徽徑五十四步得積二千二百八十九步二百分步之一十二併三積全步四千八百五十二步外密零一十四分步之一徽零二百分步之一十二以上維乘下位密子得二百分八徽子得一百六十分相併得三百六十八分為子實又上二位相乘得二千八百分為母法子母俱以十六約之為一百七十五分步之二十三一千四百乘田積來厯蓋只就密率上定之也置一千四百在地以密率十一之如十四而一為一千一百積若以古率三之四而一則得一千五十積若以徽率一百五十七乘之如二百而一得一千九十九積所以用一千四百乘積者緣古法四徽法二百皆可以除之也求三積齊同分母元分母數一百七十五元乘積數一千四百此二數相乘二十四萬五千即大分母也三積總率皆齊同於此既得此齊同分母乃各以先求到假數約之徽率得一千二百二十五密率得一萬七千五百古率得六萬一千二百五十故反以乘假數皆齊同於二十四萬五千也按條假分母數簡於前法者用舊術也然各分母之數猶有可省者蓋衆數取分母數必得最小者方為確凖其義見秦九韶數學九章大衍術中今附其法於後以發明前法所未盡者法列四數先以元母一百七十五與密方率十四相度得度盡二數之數為七次以二數相乘以度盡數除之得三百五十為二數總母又以二數總母與徽方率數相度得度盡二數之數為五十以二數相乘度盡數除之得一千四百為三數總母又以三數總母與古方率數相度則古方率四即為度盡二數之數二數相乘度盡數除之仍得一千四百即為四數總母然後以密方率十四除之得一百為密分母以徽方率二百除之得七為徽分母以古方率四除之得三百五十為古分母以元分母一百七十五除之得八為原積分母以此數與各假冪積相乘除較原數所省多矣第四十四問今有梯田一假長二百四十步並不知東西兩濶只云從東頭截長五十步計地三畝從西頭截長三十步計地五畝問二濶各多少答曰東頭元濶一十一步二分西頭元濶四十一步九分二釐法曰此問先須求見兩頭各截之停廣求東截停廣者置東頭所截三畝之積七百二十步以截長五十步除之得一十四步四分為東截地之停廣也求西截停廣者置西頭所截五畝之積一千二百步以截長三十步除之得四十步為西頭所截停廣也乃立天元一為每步之差以東頭截長五十步乘之折半得以減東停廣一十四步四分得分為東頭元小濶於上再置天元差步以西頭截長三十步乘之得折半得加入西頭停廣四十步得為西頭大濶也內減東頭小濶餘步為二濶總差也寄左再立天元每步差以正長二百四十步乘之得亦為二濶總差與左相消得步下法上實如法而一得一分二釐八毫為每步之差也置每步之差以西頭截長三十步乘之得三步八分四釐折半得一步九分二釐加入西頭停廣四十步得四十一步九分二釐為西頭元大濶也又置每步之差以東頭截長五十步乘之得六步四分折半得三步二分以減於東頭停廣一十四步四分餘一十一步二分為東頭元小濶也此問止求每步之差更不須以條假明之舊術依法求得東停廣與西停廣數乃以二停廣相減餘以二百而一謂東截長五十步其停廣當二十五步餘去了二十五步也西截長三十步其停廣當一十五步餘去了一十五步也兩頭計去了四十步以減於正長二百四十步餘二百步所得為每步之差乃副置半步之差左以東截長乘之以減東停廣餘為東元濶也右以西截長乘之以加西停廣併為西元濶也又法置一步之差以正長二百四十乘之所得為都濶差也以都濶差加於小頭濶則為大頭濶也第四十五問今有方田一假中心有方田池占之外計地一畝只云從外田東南隅至內池西南隅一十三步問內外田方各多少答曰內池方七步外田方一十七步法曰立天元一為內池方以自乘倍之得元加入見積得寄左又列至步自之得一百六十九步又倍之得三百三十八步與左相消得開平方得七步即內池方也池方自之加入見積再開平方即外田方面也依條假求之只據前式便是更不須重畫也只是將見積打作四假小直田以池面為較以外田方面為和以斜至步為弦然此問惟是其池正在方田中心可依此法求之若稍有偏側則不能用也舊術列去角步自乘為二位頭位減半田積開平方見內池面下位加半田積開平方見外田面也第四十六問今有方圓田各一假共計積一百二十七步只云其方面大如圓徑圓徑穿方斜共得二十步問面徑各多少答曰方面一十步圓徑六步法曰立天元一為圓徑減穿步得丨為方斜以自之得丨為方斜冪於頭再置天元圓徑以自之又以一步四分七釐乘之得步為展起圓田也併入頭位得步為展數如積一假寄左然後列見積一百二十七步兩度下加四兩度下加四止是以一步九分六釐乘之也以一步九分六釐乘之者變方田為斜田也得二百四十八步九分二釐與左相消得下式開平方得六步即圓徑也以徑減穿步即方斜也依條假求之穿步冪內減去展起見積為實二之穿步為從二步四分七釐虛隅義曰下式乃展起之圓積也亦俱是減數也此數該一步四分七釐之方又從步內疊出一步虛隅計得二步四分七釐常法也舊術曰以一步九分六釐乘田積為頭位又列穿步自乘內減去頭位餘為實倍穿步為從亷常置二步四分七釐減從開方第四十七問今有直田一假中心有小方池結角占之外計地二千七十九步只云從田二頭至池角二十一步半兩邉至池角七步半問三事各多少答曰長六十四步濶三十六步池方一十五步法曰立天元一為內方面身外加四又加二之頭至步四十三得為田長也又置池方面身外加四又加入二之邉至步一十五得為田濶也長濶相乘得下式為直田積於頭又置天元池方面以自之得元丨為內方池以減頭位得為如積一假寄左然後列見積二千七十九步與左相消得開平方得一十五步即內池方面也方面外加四副二位若加兩頭至池步見長若加兩邉至池步即見濶也依條假求之積步內減四假邉至與頭至步相乘數為實併至頭至步倍之又身外加四為從九分六釐常法義曰水池外有九分六釐常法從步皆加四者蓋於斜上求方面也第四十八問今有方田一假內有直池水占之外有地三百四十步只云其池廣不及長四步又云從田楞通池長一十五步問三事各多少答曰田方二十步內池長一十步廣六步法曰立天元一為池長減於倍通步丨為田方面以自之得丨為田方積於頭再置天元池長內減較四步丨為池濶以天元乘之得丨為直池積以減頭位得為如積一假寄左然後列直積三百四十步與左相消得下法上實如法而一得一十步即池長也以長減於倍通步即方田面也依條假求之四假通步冪內減田積為實四之通步內減池較為法如法得池長義曰四之通步為法內缺一箇池長冪却用所漏之池補之猶差一池較為法合除之數也既於實積內虛了此數故作法時於四之通步內減去一數也第四十九問今有方田一假內有小方池結角占之外計地一萬八百步只云從外田楞至內池角各一十八步問內外方各多少答曰外田方一百二十步內池方六十步法曰立天元一為內方面身外加四又加倍至步三十六得為田方面以自乘得為外方積於頭再置天元內方面以自之得元丨為內池積也以減頭位得為如積一假寄左然後列真積一萬八百步與左相消得開平方得六十步為內池方面也內方面身外加四又加倍至步即方面也依條假求之見積內減四假至步冪為實四之至步身外加四為從九分六釐常法義曰從步內加四者是於一箇方面上求第五十問今有方田一假自有小方池結角占之外計地九千三百七十五步只云從外方角至內池面各五十七步半問內外方各多少答曰外田方一百步內池方二十五步法曰立天元一為內方面加倍至步一百一十五步得丨為外田斜以自之得丨為所展方積於頭再置天元內池面以自之得元丨為內池積又就分以一步九分六釐乘之得下元亦為所展之池積也以減頭位得為一假所展如積寄左然後列真積九千三百七十五步以一步九分六釐乘之得一萬八千三百七十五與左相消得開平方得二十五步即內方面也依條假求之展積內減四假至步冪為實四之至步為從九分六釐虛常法義曰展積時其池亦展得虛了九分六釐也第五十一問今有方田一假內有小方池結角占之外計地四十五畝只云從外田南邉斜通池北角一百二步問內外方各多少答曰外田方一百二十步內池方六十步法曰立天元一為內方面身外加四為池斜以減於倍通步二百四步得為外方面以自之得為方田積於頭又置天元內池面以自之得下元丨為內方池也以內方池減頭位得為如積一假寄左然後列真積一萬八百步與左相消得平方開之得六十步為池方面也依條假求之四假通步冪內減見積為實四之通步加四為從九分六釐虛隅法義曰從步身外加四者蓋是於池斜上求池面也舊術曰倍通步自乘以田積減之餘折半為實倍通步加四為從亷常置四分八釐減從開方見內方面第五十二問今有方田一假內有方池結角占之外計地三十九畝零一十五步只云從田東南角至內池西北面八十二步半問內外方面各多少答曰外田方面一百步內池方面二十五步法曰立天元一為內方面減於倍通步一百六十五步得丨為外田斜也以自之得丨為所展外田積於頭再置天元池方面以自之為方池積又就分以一步九分六釐乘之得元為所展方池積也以減頭位得為展起底如積一假寄左然後列真積三十九畝一十五步通納得九千三百七十五步又就所展分母一步九分六釐乘之得一萬八千三百七十五步與左相消得平方開之得二十五步即內池面也以池面減於倍通步又身外去四即外方面也依條假求之四假通步冪內減展積為實四之通步為從九分六釐常法義曰元以展積減四假通步冪時漏下一步九分六釐池積今來於從步內疊用了一個方外剩九分六釐第五十三問今有方田一假內有直池結角占之外計地八百五十步只云從田角通水長三十七步通水濶三十二步問三事各數答曰池長二十五步濶一十五步外田方三十五步法曰立天元一為內池長減於倍通步七十四步得丨為外田斜也以自之得丨為所展外田積於頭再置倍通長七十四步內減倍通濶六十四步餘一十步乃池長濶差也或直以通長通濶相減於者倍之亦為長濶差也再置天元池長內減長濶差得丨為濶也以天元長乘之得丨為直池積也又就分以一步九分六釐乘之得為展起底直池積也以減頭位得下式為所展如積一假寄左然後列真積八百五十步就分以一步九分六釐乘之得一千六百六十六步與左相消得開平方得二十五步為內池長也以減倍通長步又身外去四即外田方面也依條假求之四假通長冪內減展積為實四之通長於頭以一步九分六釐乘長濶差以減頭位為從九分六釐常法義曰據從步合用之積於疊起處少了一方今將減積時漏下所展水池補了一甲之地若更得一乙之地則共補成一步九分六釐之地方也按原圖仍用正方今易為直方庶為簡明今不可補故於從步內減去所展差步便是於從法合用之積內借了一乙之地恰補就一步九分六釐之方也除補了疊起的一步方外猶剩九分六釐故以之為常法也第五十四問今有方田一假內有直池結角占之外計地一千一百五十步只云從田角至水兩頭各一十四步至水兩邉各一十九步問三事各多少答曰方四十五步池長三十五步濶二十五步法曰立天元一為池濶加二之邉至步三十八得丨為外田斜以自之得丨為所展外田積於頭二之邉至步內減二之頭至步餘一十步為池長濶差也再置天元池濶加差一十步得丨為池長也用天元池濶乘之得丨為直池積也又就分以一步九分六釐乘之得步為所展之池積也以減頭位得為所展如積一假寄左然後列真積一千一百五十步以一步九分六釐乘之得二千二百五十五十四步與左相消得開平方得二十五步為池濶也又加二之邉至步又身外去四即外方面也依條假求之展積內減四假邉至步冪為實四之邉至步於頭以一步九分六釐乘長濶差減頭位餘為從九分六釐虛常法義曰所展池積內將四假紅按原圖應減者以紅色别之積恰補作九分六釐虛常法其兩箇所占半差於減從時又以一步九分六釐乘之者蓋欲合身外加四所乘積也按展積義多未備此條尤略今具圖說以詳之義曰外四隅方所減之四至冪也中十字積為實則池濶為隅四之至步為從也附直池外斜方展池積也平分上下二尖形附於左右二尖形外成一原池濶乘展池正長之直方展池正長為原池長之一步九分六釐十字積與展池積之較為實是前從隅內應少原池長之一步九分六釐又為少原池長濶較之一步九分六釐併原池濶之一步九分六釐故展較減前從以為從展隅反減前隅為虛隅也第五十五問今有圓田一假內有圓池水占之外計地二十三畝一分只云內外周徑共相和得四百二十四步問內外周徑各多少圖依密率答曰外周二百八十六步徑九十一步內周一百一十步徑三十五步實徑二十八步法曰立天元為實徑以減相和步四百二十四得丨為內外周共步用天元實徑乘之得丨為如積兩假寄左然後列二之真積一萬一千八十八步與左相消得丨開平方得二十八步為實徑也以徑步除田積於頭位又二十二乘徑步如七而一得數若加頭位即外周若減頭位即內周也義曰以徑步除田積所得乃半內周半外周共步也又據古率三箇實徑即是半箇外內周差步也緣此問係是密率故以二十二乘徑以七約之也即得半差以加共步即是外周以減共步即是內周也又據古率三之實徑以加減共步者緣共步便三空徑三實徑共數也於此共數內加三實徑則恰是三箇大圓徑故為一箇外周也若共數內減去三實徑則正有三箇小圓徑故為一箇內周也今是密率故先以二十二之七而一所以附就此數以求內外周也依條假求之倍積步為實和步為從一益隅義曰以和步為從是於內外周數外又引出一步虛常法也第五十六問今有圓田一假內有圓池水占之外計地二十三畝一分只云從外田通內池徑六十三步問同前答同前法曰立天元為實徑加通步六十三得丨為外田徑以自之得下丨為外圓徑冪又十一之得下式為十四假外圓積於頭再置天元實徑以減通步得丨為內圓徑以自之得丨為內圓徑冪又十一之得為十四假內圓積也以減頭位得下式步為十四假如積寄左然後列真積二十三畝一分法通得五千五百四十四又就分一十四之得七萬七千六百一十六與左相消得下法上實如法而一得二十八步為實徑也以實徑加通步即外徑若減通步即內池徑也依條假求之十四之積為實四十四之通步為法求得實徑此問難以為式强立此式以推之每積之長乃三箇通步今十四之積合以四十二箇通步除之今用四十四之通步為法者緣密率之周稍多於古率之周也假令古率七箇積即合用二十一箇通步為法若依密率七箇積即合用二十二箇通步為法此問乃併十四之積為實是合用四十四箇通步為法也舊術曰二十二之通步如七而一為法除田積見徑又法倍通步自之又十一之於上以十四之積減上餘為實四十四之通步為法見池徑按條假皆於立天元一內取出而於方圓變積之義或未暇深思故謂難以為式若以方環圓環解之固易易耳今增一圖義於後而舊術又法先求池徑更可互相發明因並附焉義曰圓冪率十一方冪率十四以十四乘圓環積便為十一方環積每環為實徑乘通步之直方四故以十一方環積為實四十四通步為法即得實徑也義曰倍通步即大小徑併其冪內有大小徑冪各一大小徑相乘直方二內減圓環積所變之方環積餘小徑冪二大小徑相乘之直方二又為小徑乘大小徑併之直方二又為小徑乘通步之直方四故以十一倍之積較為實四十四之通步為法即得小徑也第五十七問今有圓田一假內有直池水占之外計地八千七百四十四步只云兩頭至田楞各二十一步兩畔至田楞各四十五步問三事各數答曰田徑一百二十四步池長八十二步濶三十四步法曰立天元一為池濶加二之畔至步得丨為外田徑以自之得丨為田徑冪以三之得為四假圓田積於頭二至步相減餘二十四步又倍之得四十八步為池長濶差也再立天元池濶加差得丨為池長以天元濶乘之得丨為池積又就分四之得為四假直池積以減頭位得丨為如積四假寄左然後列真積八千七百四十四步就分四之得三萬四千九百七十六步減頭位得丨平方開之得三十四步為池濶也依條假求之四之見積內減十二假畔至步冪為實十二之畔至步內減四箇長濶差餘為從一步虛常法義曰八處以紅志之者共是從內所減之數也舊術曰四之積步於上又倍一畔步自乘三之減上餘為實又併一頭一畔步六之內減了長濶之差餘為從亷常置一步減從開方見池濶也第五十八問今有圓田一假內有直池占之外計地一千五百八十七步只云從田楞通地長四十二步通地濶三十七步問三事各數答曰田徑五十四步池長三十步濶二十步法曰立天元一為內池長以減倍通長八十四步得丨為田徑以自之得丨為田徑冪以三之得為四假圓田於頭再立天元一為池長內減長濶差得丨為池濶以天元一乘之得丨又就分四之得為四假池積求長濶差者倍通長內減倍通濶即是也以減頭位得下式丨為四假如積寄左然後列四之真積六千三百四十八步與左相消得丨開平方得三十步為內池長也以長減倍通長即田徑也依條假求之十二之通步冪內減四之見積為實十二之通步內減四差為從一步常法義曰十二之從步內減去了三箇差又以三箇漏下池積補了疊起底三步虛方外猶剩一池更用一差減從併上所剩之一池恰補成一步常法也第五十九問今有二方夾一圓失却圓水占外有田積一十一畝五分五釐其方圓相去重重徑等問方圓各多少答曰內方面一十二步圓徑三十六步外方面六十步法曰立天元一為等數五之得為外方面自之得元為外方積於頭一次立天元一為等數以三之得為中圓徑以自之得元為圓徑冪又三之四而一得元為池積以減頭位得元為外田積內減了中圓積之數於次位一再立天元等數便為內方面以自之得元丨為內方積却加入次位得下為如積一假寄左然後列真積一十一畝五分五釐以畝法通得二千七百七十二步與左相消得步下法上實如法而一得一百四十四步再開平方得一十二步為等數也便是內方面也三之為中圓徑五之為外方面此問更無條假舊法以十九步二分半除積步得內方冪只是以一步推之也假令內方一步則圓徑三步外方面五步也於外方積二十五步之內減了中圓積六步七分半却加入內方積一步計得十九步二分半也第六十問今有二圓夾一方失却中方水占外有田積一十四畝一分七釐半其方圓相去重重徑等問方圓各幾何答曰內圓徑一十八步方面五十四步外圓徑九十步法曰立天元一為等數以五之為外圓徑以自之得元為外徑冪又三之四而一得為外田積於頭再立天元等數以三之為中方面又自之得元為中方冪以減頭位得元為外圓積內減了中方冪之數於次位又置天元等數便為內圓徑以自之得元丨為內徑冪又三之四而一得元為內圓積也却加入頭位得元為如積一假寄左然後列真積一十四畝一分七釐半以畝法通得三千四百二步與左相消得下法上實如法而一得三百二十四步再開平方得一十八步為等數便是內圓徑也副置之三因為中方面五因為外圓徑也此問與前問意同更無條假舊法以十步半除積步得內徑冪亦只是以一步推之假令內圓徑一步則是中方面三步外圓徑五步先置外圓積一十八步七分半內減了中方積九步却加內圓積七分半共得一十步半也第六十一問今有方田一假靠西北隅有圓池水占之外計地九百二十五步只云從外田東南隅至池楞二十五步問面徑各多少答曰外田方面三十五步內池徑二十步法曰立天元一為內池徑身外加二得為池東南楞至田西北角也又加斜至步二十五步得為外田斜以自之得為田斜冪於頭再立天元圓徑以自之為冪又以一步四分七釐乘之得元為所展圓池積以減頭位得為所展如積一假寄左初立天元身外加二者以方求斜合加四今求一半故加二也斜按加二係以方求半方半和之數也然後列真積九百二十五步就分以一步九分六釐乘之得一千八百一十三步與左相消得平方開得二十步為池徑也池徑外加二又添入斜至步却身外除四即外方面也依條假求之展積內減斜至冪為實倍至步身外加二為從三釐虛常法減從開平方義曰於一方外虛了四分七釐從上帶了四分外虛七釐又於從上乘起四釐外猶虛三釐故以三釐為常法此圖內二分合畫作極細形狀與四分七釐外圓邉正自相應今不應者但二分差濶耳所以畫作差濶之狀者正欲易辨二分之數也按原圖式有附斜至冪外磬折形無附池徑冪外磬折形且二形相離皆𫝊本之誤也故義中所論亦不知其何指今訂補此圖二分不必加濶未嘗不易辨也第六十二問今有方田二假靠西北隅有方池結角占外計地四畝一十五步只云從田東南隅斜至水方面一十九步問內外面各多少答曰外方面四十步內方面二十五步法曰立天元一為池方面身外加四八又加入斜至步一十九步得為外田斜也先將池斜變為方故加四後又將池方變為斜復合加四兩度加四於一步上合得一步九分六釐今求一半故身外止加四八也按方一步求斜身外加四又以斜為方求斜再身外加四是原方求再斜為身外加九六今求半方半再斜之和數故加四八也以自之得為外田斜冪於上再立天元一為池方面以自之又以四十九乘之如二十五而一得元為展起方池積以減上得為所展如積一假寄左然後列真積四畝一十五步以畝法通內得九百七十五步又隨分以一步九分六釐乘之得一千九百一十一步與左相消得平方開得二十五步為內池方面也於此方面上兩次求斜合得一步九分六釐以除元方一步外有九分六釐半之則得四分八釐故此方面上加四八更加入斜至步為大方斜也以條假求之展積內減至步冪為實二之至步以一步四分八釐乘之為從二分三釐四絲為常法義曰此一問其展起積時於一池之外虛了九分六釐却於一箇從步內加四分八釐二箇從步計加了九分六釐恰就了所展虗數除外有一假四分自乘數該一分六釐於上又有兩假四分乘八釐數按附自乘方外該六釐四毫於次又有一假八釐自乘數按小方隅該六毫四絲於下三位併得二分三釐四絲此數係是於展積內實有之數故以常法也舊術以四十九乘田積如二十五而一于頭位以至水步自乘減頭位為實餘與條假同按原圖式四分八釐方內按分釐數細分之因其數甚微又以分數釐數作等數分之終不免混淆今以亷隅線易之第六十三問今有大圓田一假大小方田二假其小方田內有圓池水占之外共計積六萬一千三百步只云小方田面至池楞三十步大方田面多於小方田面五十步其圓田徑又多於大方田面五十步問四事各多少答曰小方田面一百步池徑四十步大方田面一百五十步圓田徑二百步法曰立天元一為內池徑加二之至水六十步為小方面於小方面上又加入大小方面差五十步即大方面也於大方面上又加入大圓徑大方面差五十步即大圓徑也具圖於左一內圓徑太丨一小方面丨一大方面丨一大圓徑丨乃先置天元內圓徑以自之義三之得元為四假圓池積於上又置小方面丨以自之得丨為小方積以四之得下式為四假小方積於次又置大方面以自之得丨為大方積四之得為四假大方積於下又置大圓徑下式丨以自之得丨為大圓徑冪以三之得下式為四假大圓積於下位之次併下三位得下式於右以四池積元減於右得為如積四假寄左然後列真積六萬一千三百步就分四之得二十四萬五千二百步與左相消得平方開之得四十步為內池徑也各加差步即各得方面與圓徑也依條假求之四之田積於頭位內減三假按落大圓徑三字多池徑冪又減四假大方面多池徑冪又減十六假至水步冪為實六之圓田多池徑步又八之大方田面多池徑步又十六之至水步三位併之得二千三百二十步為從法亷常置八步開平方義曰三假圓徑冪乃四箇圓田積此數內有三箇方也其四假大方田積內有四箇方也其四假小方積每箇圓池外餘二分半四池計餘一步方也三位上併帶八步方第六十四問今有方田一假中心有環池水占之外計地四十七畝二百一十七步只云共環水內周不及外周七十二步又從田四角至水各五十步半問內外周及田方方各多少答曰外周一百八十步內周一百八步田方一百一十五步法曰立天元一為池內徑先以六除內外周差七十二步得一十二步為水徑倍之得二十四步加入天元池內徑得丨為池外徑又加倍至步一百一步得下式丨為外田斜以自之得丨為田斜冪於頭位再立天元池內徑加入二之水徑得丨為池外徑以自之得丨為外徑冪又以一步四分七釐乘之得下式步為展起底外圓積於次上再立天元一池內徑以自之元丨亦以一步四分七釐乘之得元步為展起底內圓積以減次上得步為所展底池積也以此池積減頭位得下式步丨為展起如積一假寄左然後列真積四十七畝二百一十七步以畝法通納之得一萬一千四百九十七步又就分以一步九分六釐乘之得二萬二千五百三十四步一分二釐與左相消得下式步丨開平方得三十六步即池內徑也三之為內周又加差為外周置內徑加二之水徑又加倍至步為外方斜也置外方斜身外去四即外田方面也依條假求之以一步九分六釐乘田積於頭位以水徑加至步以自之為冪又四之以減頭位又倍水徑自乘又以一步四分七釐乘之却加入頭位為實又水徑加至步四之於頭位又三之水徑以一步九分六釐乘之減頭位為從一步常法此問圖式有三第一式即所畫原樣是也以一步九分六釐乘之變為斜冪其式如後右第二式也黑者為元問㸃者盡是展數恐糢糊難辨再具加減圖式於下更不見舊式也右第三式也其圓環以條假命之只是一箇方環內取四分之三也却加入三假展起底水徑冪外只有三假展起底水徑乘內圓徑直田積也此係展環之虛數也今以至步並水徑共為從故於內却除去水徑之虛步也必須以一步九分六釐乘水徑而去從者緣二停虛環並是展起之積故減從時將水徑亦展起而減之也按展水徑展內圓徑皆於原數身外加四今以內圓徑為不動則水徑必兩度加四故以一步九分六釐乘之也益古演段卷下
