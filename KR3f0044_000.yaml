body:
  text: 提要益古演段三卷天文算法類二算書之屬臣等謹案益古演段三卷元李冶撰據至元壬午硯堅序稱冶測圓海鏡既巳刻梓其親舊省掾李師徴復命其弟師圭請冶是編刋行是書在測圓海鏡之後矣其曰益古演段者蓋當時某氏算書案冶序但稱近世有某是冶已不知作者名氏以方圓周徑冪積和較相求定為諸法名益古集冶以為其藴猶匿而未發因為之移補條目釐定圖式演為六十四題以闡明奧義故踵其原名其中有草有條段有圖有義草即古立天元一法條段即方田少廣等法圖則繪其加減開方之理義則隨圖解之蓋測圓海鏡以立天元一法為根此書即設為問答為初學明是法之意也所列諸法文皆淺顯蓋此法雖為諸法之根然神明變化不可端倪學者驟欲通之茫無門徑之可入惟因方圓冪積以明之其理猶屬易見故冶于方圓相求各題下皆以此法步之為草俾學者得以易入自序稱今之為算者未必有劉李之工而褊心局見不肯曉然示人惟務隱互錯糅故為溟涬黯黮惟恐學者得窺其倣佛云云可以見其著書之㫖矣至其條段圖義觸類雜陳則又以必習于諸法而後可以通此法故取以互相發也其書世無𫝊本顧應祥唐順之等見測圓海鏡而不解立天元一法遂謂祕其機以為竒則明之中葉業已散佚今檢永樂大典尚載有全編特録存之俾復見于世以為算家之圭臬永樂大典所載不分卷數硯堅序稱三卷今約略篇頁仍釐為三卷其𫝊寫訛謬者各以本法推之咸為校正焉乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀益古演段序算數之學其來尚矣率自九章支分派委劉徽李淳風又為之注後之學者咸祖其法敬齊先生天資明敏世間書凡所經見靡不洞究至於薄物細故亦不遺焉近代有移補方圓自成一家號益古集者大小七十問按書中六十四問先生一寓目見其用心之勤惜其祕而未盡剖露翻圖式繹條段可移則移之可補則補之祥按祥字有脫誤應作說之詳非若溟涬黯黮之不可曉析之明非若淺近粗俗之無足觀釐為三卷目曰益古演段頗曉十百披而覽之辟如登坦途前無滯礙旁蹊曲徑自可縱橫而通嘉惠後來為視隱互雜糅惟恐人窺其倣佛者相去大有徑庭矣先生又盡攄已見輯為測圓海鏡一編二百問按今本一百七十問同出一原緻密纎悉備而不繁參考互見真學者之指南也海鏡既命工刻梓省掾李師徵其親舊也囑弟師圭請是編刋而行之將與衆共推善及人良可尚也已數學在六藝為未求之人最為切要邇來精其能者殊鮮自非先生學有餘力誠能搜剔軒轅隸首之奧有不暇矣雖然是特大烹之一臠耳若夫先生胸中渾涵停蓄測之愈深挹之不窮時發於翰墨昭不可掩者則大全集在當嗣此出願肅袵以觀至元壬午仲秋二十六日鄖城硯堅序自序術數雖居六藝之末而施之人事則最為切務故古之博雅君子馬鄭之流未有不研精於此者也其撰著成書者無慮百家然皆以九章為祖而劉徽李淳風又加注釋而此道益明今之為算者未必有劉李之工而褊心局見不肯曉然示人惟務隱互錯糅故為溟涬黯黮惟恐學者得窺其倣佛也不然則又以淺近粗俗無足觀者致使軒轅隸首之術三五錯綜之妙盡墮於市井沾沾之兒及夫荒村下里蚩蚩之民殊可憫悼近世有某者以方圓移補成編號益古集真可與劉李相頡頏豫猶恨其閉匿而不盡發遂再為移補條段細翻圖式使粗知十百者便得入室啖其文顧不快哉客有訂愚曰子所述果能盡軒隸之祕乎愚應之曰吾所述雖不敢追配作者誠令後生輩優而柔之則安知軒隸之祕不於是乎始客退因書以為自序時大元己未夏六月二十有四日欒城李冶序
