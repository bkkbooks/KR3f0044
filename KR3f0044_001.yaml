body:
  text: 益古演段卷上元李冶撰第一問今有方田一段内有圓池水占之外計地一十三畝七分半並不記内圓外方只云從外田楞至内池楞四邊各二十步問内圓外方各多少答曰外田方六十步内池徑二十步法曰立天元一為内池徑加倍至步得丨按太即真數此即四十步併一池徑為田方靣按方靣即每邊以自增乗得丨按此即一千六百步八十池徑一平方併為方積於頭再立天元一為内池徑以自之又三因四而一得太按此即百分平方之七十五上二存步與池之位為池積以減頭位得按此即一千六百步八十池徑二分半平方為一段虚積寄左然後列直積以畝法按畝法二百四十步通之得三千三百步與左相消按相消者兩邊同減一千六百歩後凡言相消者皆兩邉加減一數也得按此即一千七百歩與八十池徑二分半平方等開平方得二十步為圓池徑也倍至步加池徑即外方靣也按今借根方法即立天元一法詳見御製數理精蘊兹不盡釋以條段求之真積内減四段至步冪為實四之至步為從二分半常法義曰真積内減四段至步冪者是減去四隅也以二分半為常法者是於一步之内占却七分半外有二分半也第二問今有方田一段内有圓池水占之外計地一十三畝七分半並不記徑面只云從外田南楞通内池北楞四十步問内圓外方各多少答曰同前法曰立天元為池徑減倍通步得丨按此即八十步少一圓徑為田方靣以自増乗得丨按此即六千四百步少一百六十徑多一平方為方田積於頭又以天元池徑自之三因四而一得太按此即百分平方之七十五為池積以減頭位得按此即六千四百步少一百六十徑多二分半平方為一段虚積寄左然後列真積三千三百步與左相消得按此即三千一百步與一百六十徑少二分半平方等開平方得二十歩即内池徑也倍通步内減池徑為方靣也依條段求之倍通步自乗於頭位以田積減頭位餘為實四之通步為從二分半虚常法義曰倍通步者是於方靣之外引出一圓也用二分半虚常法者是一箇虚方内却有減餘圓池補了七分半外欠二分半故以之為虚隅也第三問今有方田一段内有圓池水占之外計地一萬一千三百二十八歩只云從外田角斜至内池楞各五十二步問靣徑外方各多少答曰外田方一百二十步内池徑六十四步法曰立天元一為内池徑加倍至步得丨為方斜以自増乗得丨為方斜冪於頭其方斜上本合身外減四今不及減便是寄一步四分為分母也今此方斜冪乃是變斜為方靣以自乘之數又别得是展起之數也又立天元為池徑自之又三因四而一為池積今為方田積既以展起則此池積亦須展起故又用一步九分六釐乗之得一步四分七釐亦為一箇展起底圓池積也以一步九分六釐乘之者葢為分母十四以自之得一步九分六釐也以池積減田積餘為一段虚積寄左然後列真積一萬一千三百二十八步亦用分母冪一步九分六釐乗之或兩度不加四亦同得二萬二千二百二步八分八釐與左相消得平方開之得六十四步為内池徑也倍至步加池徑身外除四見方靣也一法求所展池積以徑自之了更不湏三因四除及以一步九分六釐乗之只於徑冪上以一步四分七釐按此即三因四除一步九分六釐之數乗之便為所展之池積也依條段求之展積内減四段至步冪餘為實四之至步為從四分七釐益隅義曰凡言展積者是於正積上以一步九分六釐乗起之數元法本是方靣上寄一步四分分母自乗過於每步上得一步九分六釐故今命之為展起之數也諸變斜為方者皆凖此所展之池積是於一步圓積上展出九分六釐若以池徑上取斜為外圓徑則一步上止生得四分七釐也故以四分七釐為虚常法又取方冪一步九分六釐四分之三亦得圓積一步四分七釐也按法内皆以徑一周三方五斜七為率故各靣積分數與宻率不合葢此書専為明理而作宻率數繁碍於講解故用古率以從簡且其法既明即用宻率亦無不可第四問今有方田一段内有圓池水占之外計地一萬一千三百二十八步只云從外田角斜通池徑得一百一十六步問靣徑外方各多少答曰外田方一百二十步内池徑六十四步法曰立天元一為圓徑減倍通步得下丨為方斜以自之得丨便為所展方田積於上再立天元一為池徑以自之又以一步四分七釐乗之得太步便為所展圓池積也以池積減上田積餘得為一段如積寄左然後列真積如法展之得二萬二千二百二步八分八釐與左相消得平方開之得六十四步為内池徑也以池徑減倍通步即是方田斜身外除四為方靣也以條段求之四段通步冪内減展積為實四之通步為從四分七釐常法義曰四之通步為從其減積外實欠一箇方今即有展池減時所剰之積補却一箇虛方外猶剰一箇四分七釐為常法也第五問今有方田一段内有圓池水占之外計地一十三畝二分只云内圓周不及外方周一百六十八步問方圓各多少答曰外方周二百四十步内圓周七十二步法曰立天元一為内圓周加一百六十八步得丨為外方周以自増乗得丨為一十六箇方田積又三因之得為四十八段方田積於頭所以三因為四十八者就為四十八分母也再立天元圓周以自之元丨為十二段圓池積圓周冪為九箇圓徑冪每三九箇圓徑冪為四箇圓池積今箇圓徑冪共為十二箇圓池積也又就分四之得元為四十八箇圓池積以減頭位得丨為四十八段如積寄左然後列真積一十三畝二分以畝法通之得三千一百六十八步又就分母四十八之得一十五萬二千六十四步與寄左相消得丨平方開之得七十二步為内圓周也三而一為池徑依條段求之四十八段田積内減三段不及步冪為實六之不及為從一虚隅義曰每一箇方周方為十六段方田積今三之為四十八段方田積也内除了三箇圓周冪外於見積上虚了一箇圓周冪也今求圓周故以一步為虚隅法舊術曰以十六乗田積為頭位以合方周之積以不及步自乗減頭位餘三之為實六之不及步為從法㢘常以一步為減從法第六問今有方田一段内有圓池水占之外計地二千六百七十三步只云内圓周與外方靣數等問各多少答曰外方靣内圓周各五十四步法曰立天元一為方靣便是圓周以自之得元丨便為十二段池積也再立天元方靣以自之又十二之得元為十二段方田積也二數相減餘元為十二段如積寄左然後列真積就分母十二之得與左相消得平方開之得五十四步為方靣亦為圓周徑也依條段求之十二之真積為實無從一十一步常法義曰一箇方田積便是一箇圓周積也一箇圓周積便是十二箇圓池積今將一十二箇圓池積減於十二箇方田積通有十一段方田積也舊術曰以十二乗田如十一而一所得開方除之合前問也又法立天元一為等數以自之為外田積又就分母九之得元為九箇方田積於頭又立天元等數以自之為十二箇圓池積也三之四而一得元為九箇圓池以減頭位得元為九段如積寄左然後列真積就分九之得二萬四千五十七步與左相消得平方開得五十四步為等數也依條段求之九之積為實無從八步二分半為常法義曰每一箇方冪為十二箇圓池今將見有底九箇圓池去了七分半餘二分半併實有八箇方恰是八箇二分半也又法立天元一為徑以三之為外方靣以自之得元為外方積於上再立天元圓徑以自之三之四而一得元為圓池積也以此圓積減方積得元為一段如積寄左然後列真積與左相消得下式平方開得一十八步為圓徑也以條段求之積為實八步二分半為常法義曰中間一方除圓池四分之三外有四分之一即是一步内得二分半也舊術曰列積步以八步二分半為法除之所得再開方見内圓徑第七問今有方田一段内有圓池水占之外計地一千三百五十七步只云外方靣不及内池周一十四步問方圓各多少答曰方靣四十步圓周五十四步法曰立天元一為外方加不及一十四步得丨為内周以自増乗得丨為十二箇圓池積於頭再立天元方靣以自之又十二之為十二箇方田積内減頭位得為十二段如積寄左然後列見積一千三百五十七步就分母十二通之得一萬六千二百八十四步與左相消得開平方得四十步為外方靣也依條段求之十二之積内加入不及步冪為實二之不及步為虚從十一步常法義曰其十二段積内𢃄起十二箇圓池其十二箇圓池補成一箇圓周方其圓周多於方靣十四步故自之為冪加入所欠之一角又二之為虚從恰得十一箇方也第八問今有方田一段内有圓池水占之外有地一十三畝七分半只云内外方圓周共相和得三百步問方圓周各多少答曰外方周二百四十步内圓周六十步法曰立天元一為圓徑以三之為圓周以減共步得為方周以自増乗得為十六段方田積於頭再立天元圓徑以自之又十二之得太為十六箇圓池積以減頭位得為十六段如積寄左然後列真積一十三畝七分半以畝法通之得三千三百步又就分母一十六通之得五萬二千八百步與左相消得開平方得二十步為圓池徑又三之為圓周也依條段求之和步冪内減十六之見積為實六之和步為從三步常法義曰十六箇圓池該十二箇方内從步合除去九箇方外猶剰三箇方故以三步為常法也舊術曰列相和步自乗為頭位又以十六之田積減頭位又六而一為實以相和步為從法廉常置五分第九問今有方田一段内有圓池水占之外計地三千一百六十八步只云内外周與實徑共相得三百三十步問三事各多少答曰外方周二百四十步實徑十八步圓周七十二步法曰立天元一為池徑以五之減倍之相和步得為九箇方靣以自増乗得為八十一段方田積於頭位二之相和步别得是八方面六圓徑二實徑今將二實徑與一圓徑就成一方靣共前數計九方靣五圓徑却更無實徑也再立天元池徑以自之又以六十步七分半乗之得元為八十一箇圓池所以用六十步七分半乘之者欲齊其八十一分母也每箇圓池七分半以八十一通之得六十步七分半也以此減頭位餘為八十一段如積寄左然後列真積三千一百六十八步以八十一通之得二十五萬六千六百八與左相消得下步開平方得二十四步為池徑也五因池徑減倍相和餘九而一得方田靣以池徑減方餘折半為實徑依條段求之倍共步自乗於頭以八十一之田積減頭位餘為實二十之共步為從三十五步七分半為常法義曰八十一箇方田内𢃄起八十一箇圓池每箇圓池七分半此八十一箇計該六十步七分半其從步内合除去二十五箇外猶剰三十五箇七分半故以之為常法也舊術曰倍相和步自乗為頭位又以八十一乗田積減頭位餘退一位為實倍相和步為從法廉常置三步五分七釐半第十問今有方田一段内有圓池水占之外計地三千一百六十八步只云内外方圓周與斜徑共相和得三百四十二步問三事各多少答曰外方周二百四十步内圓周七十二步斜三十步法曰立天元一為池徑以二十五之減於十之相和三千四百二十步得為四十七箇外方靣以自増乗得為二千二百九段方田積於頭位十之相和步三千四百二十為方靣四十箇内池徑三十箇斜至步一十箇以一十箇斜至步合入五箇池徑共得五斜此五斜却便是七箇方靣計總數該四十七箇方靣二十五箇圓徑外更無斜至步也再立天元池徑以自之又以一千六百五十六步七分半乗之得元為二千二百九箇圓池積也所以用一千六百五十六步七分半乗之者欲齊其二千二百九分母也每一箇圓池積七分半今有二千二百九箇圓池積以七分半乘之該一千六百五十六步七分半也以此減頭位得為二千二百九段如積數寄左然後列真積三千一百六十八步以分母二千二百九通之得六百九十九萬八千一百一十二步與左相消得開平方得二十四步即池徑也以二十五之圓徑減十之和步餘四十七而一得為外方靣身加四内減了圓池徑餘折半為斜徑也按法内所用四十七方靣之數亦由立天元一法取出但截去前段恐初學不能無疑兹仍依其法補之法立天元一為池徑五因之以減倍和得為八方靣一斜共數以方五因之得為實又以方五因八方靣得四十以斜七乗一斜得七併之得四十七為法除實得方靣不除便為四十七箇方靣也依條段求之相和步進一位自乗於頭位以二千二百九之真積減頭位餘為實五百之和步為益從一千三十一步七分五釐為益隅義曰減數係是二千二百九段方靣冪内却漏下二千二百九箇圓池此數該一千六百五十六箇七分圓徑冪却於從步上疊用了六百二十五箇池徑冪外猶剰一千三十一箇七分五釐故以之為隅法其從法元有五十箇圓徑今命為之五百者縁相和步進一位也舊術曰列相和步進一位自相乗為頭位以二千二百九之積減頭位餘以三之為實又以一千五百之相和步為從法廉常置三千九十五步二分半開平方見池徑第十一問今有圓田一段内有方池水占之外計地二十五畝餘二百四步只云從外田楞至四邊各三十二步問外圓内方各多少答曰外圓徑一百步内方靣三十六步法曰立天元一為内方靣加倍至步為外田徑以自之得下式丨又三之得為四段圓田積於頭再立天元方靣以自之又就分母四之得元為四池積以減頭位得丨為四段如積數寄左然後列真積又就分四之得二萬四千八百一十六步與左相消得丨開平方得三十六步為方池靣也加倍至步即圓徑也依條段求之四之積步於頭位作三箇外圓徑冪内出了四箇方池積也内減十二之至步冪為實十二之至步為從一虚隅義曰四箇外圓田内減了十二段至步冪復以十二之至步為從又合去四箇方池今元積内有三箇虚池外猶欠一箇虚池故以一步為虛隅常減從以為法又有圓田一段中有方池水占之外有田五十步只云方池一尖抵圓邊其一尖至圓邊三步問圓徑方靣各若干答曰徑十歩靣五步法曰立天元一為方斜加三步為圓徑以自之又以一步九分六釐乗之得步按此為一平方九分六釐多十一元七分六釐多十七步六分四釐諸條皆步數在上此條獨步數在下又三之得步内減四之天元冪得上層中下云云按即多三十五元二分八釐多五十二平方九分二釐寄左然後置五十步兩度加四得步又四之得步與左相消得下層三百三十九步八釐按此下當加與一平方八分八釐多三十五元二分八釐等十八字方明負開平方得七步即池斜也副置池斜上位加至步即圓徑下位身外減四即方靣也合問依條段求之四段展起見積内減三段展起至步冪為實六之至步展起為從一步八分八釐為常法也此問若求方靣則其法甚易今求方斜故其圖須細分之義曰三箇九分六釐共計二步八分八釐其元初作四段如積時合有四箇所展之池今來只見三箇故於二步八分八釐内去却一步有餘只有一步八分八釐為常法也此法於别紙上抄得故録於此第十二問今有圓田一段内有方池水占之外有地二十五畝零二百四步只云從外田楞通内方方靣六十八步問各數若干答曰外圓徑一百步内方靣三十六步法曰立天元一為内方靣減倍通步得丨為外圓徑以自之得丨為圓徑冪以三之得為四段圓田積於頭再立天元内方靣以自之又就分母四之得元為四段方池積以減頭位得丨為四段如積數寄左然後以四之見積二萬四千八百一十六步與左相消得丨平方開之得三十六步為内方靣也減倍通步即圓徑依條段求之十二段至步冪内減四之見積為實十二之通步為從一常法義曰所減數内剰下四箇方池疊補了三箇外猶剰一箇故以之為常法第十三問今有圓田一段内有方池水占之外計地五千步只云從外田楞至内池角四邊各一十五步問方圓各多少答曰外圓徑一百步内方靣五十步法曰立天元一為内方靣身外加四為内方斜又加倍至步得為外圓徑也以自増乗得為外徑冪以三之得為四段外圓積於頭再立天元内方靣以自之又四之得元為四段方池積也以減頭位餘為四段如積數寄左然後列四之見積二萬步與左相消得開平方得五十步為池方靣也身外加四又加入倍至步即為外田徑也依條段求之四之積步内減十二段至步冪為實十二之至步身外加四為從一步八分八釐為常法義曰三箇九分六釐計二步八分八釐其四箇圓田内有四箇方水池除從步合占三箇外猶剰一箇水池却於數内取了一步餘一步八分八釐故以之為常法也其從步加四者葢取斜中之方靣也葢不加四不能見方靣而但得方斜也舊術曰四因積步為頭位又倍去角步自乗三之減頭位餘折半為實又倍去角步三因加四為從法廉常置九分四釐第十四問今有圓田一段内有方池水占之外計地三百四十七步只云從田外楞通内池斜三十五步半問外圓内方各多少答曰外圓徑三十六步内方靣二十五步法曰立天元一為内方靣加四得元為方斜以減倍通步得太為外圓徑以自増乗得為外田徑冪也以三之得為四段圓田積於頭再立天元内方靣以自之又就分四之得元為四段方池以減頭位得為四段如積寄左然後列四之見積一千三百八十八步與左相消得開平方得二十五步為内方靣也方靣加四減於倍通步得圓徑也依條段求之十二段通步冪内減四之田積為實十二之通步加四為益從一步八分八釐常法義曰此式元係虚從今以虛隅命之四段圓田減積時剰下四段方池於從步内用訖三箇外猶剰一箇却於二步八分八釐虛數内補了一歩外虚一步八分八釐故以之為法從負隅正或從正隅負其實皆同故因此廉從以别之舊術曰倍通步自乗三之為頭位四因田積減頭位餘為實又十二通步加四為從法廉常置一步八分八釐減從開方新舊廉從不同開時則同故兩存之第十五問今有圓田一段内有方池水占之外計地三十三畝一百七十六步只云内方周不及外圓周一百五十二步問外圓内方各多少答曰外圓周三百六十步内方周二百八步法曰立天元一為内方靣以四之為内方周加不及一百五十二步得為外圓周以自増乗得為十二段圓田積於頭再立天元内方靣以自之又就分十二之得元為十二段方池積以減頭位餘為十二段如積寄左然後列見積八千九十六步又就分十二之得九萬七千一百五十二步與左相消得平方開得五十二步為内池方靣也以四之為内方周加不及步為圓周也依條段求之十二段積步内減不及步冪為實八之不及步為從四步為常法也義曰十二段圓積該九段圓徑冪九段圓徑冪便是九箇圓周冪也據十二段圓積内元少十二箇方池今於周冪内除折筭外剰四箇池積故以四步為常法也舊術曰十二之積步為頭位以不及步自乗減頭位餘八而一為實以不及步為從法廉常置半步開平方新舊二術不同者舊術從簡耳算術本貴簡易而猶立新術者縁舊術難畫條段也餘倣此第十六問今有圓田一段内有方池水占之外計地三千五百六十四步只云内方周與外圓徑等問等數各若干答曰内方周外圓徑各七十二步法曰立天元一為等數便以為方周以自之為十六箇方池於頭元丨再立天元等數便以為圓徑以自之又十二之得元為十六段圓田積内減頭位餘元為十六段如積寄左然後列真積三千五百六十四步又就分十六之得五萬七千二十四步與左相消得平方開得七十二步即等數也按法後落條段一條依前例補之依條段求之十二之真積為實無從一十一步常法義曰十六箇圓積乃十二段圓徑冪也其十六箇圓積内有十六箇方池恰是一箇方也此一箇方便是等數冪也舊術曰列田積從十一段平方開之得内方靣四之即等數也乂法以十六乗田積如十一而一所得開方即等數第十七問今有圓田一段内有方池水占之外有地一千六百一十一步只云外圓徑不及内方周四十二步問方圓各若干答曰外圓徑五十四步内方周九十六步法曰立天元一為外圓徑加不及四十二步得為内方周以自増乗得下式丨為十六段池積於頭再立天元外圓徑以自之又十二之得元為十六段田積也内減頭位餘為十六段如積寄左然後列真積一千六百一十一步就分母十六之得二萬五千七百七十六步與左相消得平方開得五十四步為外圓徑也加不及步為内方周也依條段求之置十六之積加不及步冪為實倍不及步為虚從一十一步為常義曰十二箇圓徑冪該十六箇圓田積十六箇圓田積内有十六箇方池其十六箇方池於實積内侵過所加一角并二段虛從之數也第十八問今有圓田一段内有方池水占之外計地三百四十七步只云外圓周内方周共得二百八步問内外周各多少答曰外圓周一百八步内方周一百步法曰立天元一為内方靣以四之為内方周減於相和二百八步得為外圓周以自增乗得為圓周冪便為十二段圓田積於頭再立天元内方靣以自之又就分十二之得元為十二段方池積也以減頭位餘為十二段如積寄左然後列見積三百四十七步就分母十二之得四千一百六十四步與左相消得開平方得二十五步為内方靣也四之為内方周減於相和步為圓周也依條段求之以十二之積步減和步冪為實八之和步為虚從四常法義曰十二段圓田内有十二箇方池於方周冪内補了十二池外猶欠四箇故以四為隅法此式元係虛從今却為虛隅命之故以四為虛常法舊術曰相和步自乗於頭位以十二之積步減頭位餘八而一為實相和步為從法廉常置半步減從第十九問今有圓田一段内有方池水占之外計地三十三畝一百七十六步只云内外周與實徑共相和得六百二步問三事各多少答曰外圓周三百六十步内方周二百八步實徑三十四步法曰立天元一為内方靣以減一百七十二得丨為外田徑也倍云數得一千二百四步别得是六箇圓徑八箇方靣兩箇實徑今将一箇方靣兩箇實徑合成一箇圓俓併前數而計是七箇方靣七箇圓徑也今置一千二百四步在地以七約之得一百七十二步為徑靣共也便是一箇方靣一箇圓徑更無實徑也以自增乘得丨為圓徑冪也以三之得為四段圓田積於頭再立天元内池靣以自之又就分四之得元為四池積以減頭位得丨為四段如積寄左然後列見積八千九十六步又就分四之得三萬二千三百八十四步與左相消得丨開平方得五十二步為内方靣也以七之方靣減於倍和步餘以七而一即圓徑也圓徑内減方靣餘者又半之即實徑也依條段求之徑靣共一百七十二也自之為冪又三之於頭位内減四之見積餘為實六之徑靣共步為從一常法義曰四之真積内有四箇方池於從法内疊周了三箇外剰一箇故以一步為常法舊術曰倍相和步自乗三之為頭位以一百九十六步按此即四與四十九相乗之數之田積減頭位餘以十四而一為實又六之相和步為從法廉常置三步半開平方見内方靣第二十問今有圓田一段内有方池水占之外計地二千四百七十五步只云内外周與斜徑相和得二百五十九步半問三事各多少答曰外圓周一百八十步内方周六十步斜十九步半法曰立天元一為内方靣以三十三之減於十之云數二千五百九十五步得為三十五箇圓田徑十之云數内有外圓徑三十箇内方靣四十箇角斜十箇今將七箇方靣併入十箇角斜為五箇圓徑也總别得十之云數是方靣三十三箇圓徑三十五箇外更無斜徑角也乃以三十五之圓徑自増乗得下式為一千二百二十五段圓徑冪也以三因之得合以四除之今不除便為四千九百段圓田積於頭再立天元内池靣以自之又就分以四千九百乗之得為四千九百段方池積以減頭位得為四千九百段如積數寄左然後列真積二千四百七十五步就分以四千九百乗之得一千二百一十二萬七千五百步與左相消得平方開得一十五步為内方靣方三十三之方靣以減於十之相和二千五百九十五步餘三十五而一即圓徑以方靣加四減圓徑餘半之即斜徑也依條段求之十之相和步自之為冪以三之於頭位以四千九百段見積減頭位為實一千九百八十之相和步為從一千六百三十三為常法義曰減數計三千六百七十五箇圓徑冪便是四千九百箇圓田積也内漏下四千九百箇方池却於從内疊用了三千二百六十七箇方池外猶剰一千六百三十三箇方靣冪故以之為常法也其從法元有一百九十八箇方靣合用一百九十八之相和步為從今用一千九百八十箇相和步者縁為相和步先進了一位也第二十一問今有方田三段共計積四千七百七十步只云方方相較等三方靣共併得一百八步問三方多少答曰大方靣五十七步中方靣三十六步小方靣一十五步法曰立天元一為方差以減中方靣置併數三而一即得中方靣得丨為小方靣也以自之得丨為小方積於頭再立天元方差加入中方靣得丨為大方靣以自之得丨為大方積於次位又列中方靣自之得下為中方積於下位三位相併得為一段如積數寄左然後列真積四千七百七十步與左相消得開平方得二十一步即是方差也置方差數加中方即大方靣減中方即小方靣也依條段求之列併數以三約之所得即中方靣也以自之為冪又三之以減積為實無從二步常法義曰積步内減三箇中方冪外有兩箇方故得二步常法舊術又折半止得一箇方也第二十二問今有方田一段其西北隅被斜水占之外計地一千二百一十二步七分半只云從田東南隅至水楞四十五步半問田方靣多少答曰田方靣三十五步法曰立天元一為水占斜加入云數四十五步半得元丨為田斜以自増乗得步丨為田斜冪於頭再立天元一水占斜以自之為水占得小方積就分以一步九分六釐乗之得元步為所展得水占積也以減頭位得步為如積一段寄左然後列真積一千二百一十二步七分半以一步九分六釐乘之得二千三百七十六步九分九釐與左相消得開平方得三步半為水占斜加至步為田斜身外減四即是方靣也依條段求之展積内減至步冪為實二之至步為從九分六釐虛常法開平方得三步半即水占斜也義曰今將水占斜直命為小方池靣也舊術曰列田積於頭位又列至步除四則直至步以自乗減頭位餘為實二之直至為從以九分六釐為廉從開平方得二步半加直至步三十二步半得三十五步即田方靣也此圖即舊術條段也舊術減云步為直至步入法而求得二步半為直至不及方靣步新術展積入法而求得三步半為水占斜益古演段卷上
