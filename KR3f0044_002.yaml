body:
  text: 益古演段卷中元李冶撰第二十三問今有圓方田各為假共計積一千三百七步半只云方面大如圓徑一十步圓依密率問面徑各多少答曰方面三十一步圓徑二十一步法曰立天元一為圓徑加一十步得丨為方面以自之得二丨為方田積以十四之得下式為十四假方田積於頭又立天元圓徑以自乘為冪又以十一之得太便為十四假圓田積依密率合以徑自乘又十一之如十四而一今以十一乘不受除故就為十四分母也以併入頭位得為十四假如積寄左然後列真積一千三百七步半就分十四之得一萬八千三百五步與左相消得開平方除之得二十一步為密率徑也加不及步為方田也依條假求之十四之積步於上內減十四假不及步冪為實二十八之不及步為從二十五步常法義曰將此十四箇方冪之式只作一箇方冪求之自見隅從也第二十四問今有方圓田合一假共計積一千四百六十七步只云方面與圓徑相穿得五十四步問面徑各多少答曰方面一十二步圓徑四十二步法曰立天元一為圓徑減穿步五十四步得丨為方田面以自增乘得下式丨為方田積於頭位再立天元圓徑以自之又三之四而一得元為圓田積也併入頭位得為一假如積寄左然後列真積一千四百六十七步與左相消得倒積倒從開平方得四十二步為圓田徑也以減穿步即方面按法內所言倒積倒從即翻積法也蓋初商積常減原積此獨以原積減初商積倍廉常減從步此獨以從步減倍廉乃平方中之一變也古法多用之今依數布算于後以存其式法列積一千四百四十九步為實以一百零八步為長與一濶又七分半之和即從數求濶初商四十步以一濶七分半乘之得七十步以減和數餘三十八步以初商乘之得一千五百二十步為初商積大于原積反減之餘實七十一步乃二因一濶七分半所乘初商之數得一百四十步大于和數反減之餘三十二步為次商廉次商二步以一濶七分半乘之得三步半為次商隅凡和數廉隅相減此反相加得三十五步半以次商乘之得七十一步為次商積與餘積相減恰盡開得濶四十二步依條假求之穿步冪內減田積為實倍穿步為從一步七分半虛常法義曰二之從步內元減了七分半又疊了一步計虛却一步七分半也第二十五問今有方圓田各一假共計積一千三百七步半只云方周大如圓周五十八步問方圓各多少圓依密率答曰方周一百二十四步圓周六十六步法曰立天元一為圓周加周差五十八步得丨為方田周以自增乘得下式丨為方周冪便是十六箇方田積又就密率分母一十一之得為一百七十六假方田積於頭又立天元圓周以自之為冪又就分一十四之得元為一百七十六假圓田積依密率周上求積合以周自乘又以七乘之如八十八而一為一假田積也今又周密上更以十四乘之則合用一百七十六而一故就分便為此數以添入頭位得共為一百七十六假如積寄左然後列真積一千三百七步半就分以一百六十七乘之得二十三萬一百二十步與左相消得開平方得六十六步為圓田周也加多步見方周依條假求之一百七十六之積內減一十一假多步冪為實二十二之多步為從二十五步常法義曰一百七十六之積步內有一十一箇方周方一十四箇圓周方也今畫此式其一十四箇圓周方與一十一箇圓周方大小俱同者止為欲見差步權作此式其實合作一十二假圓式求之其實自見也按十一方周冪十四圓周冪共積內減去十一不及冪餘不及步乘圓周長方二十二圓周冪二十五故以二十二不及步為從二十五為隅也第二十六問今有方圓田各一假共計一千四百五十六步只云方周大如圓周方圓周共相和得二百步問二周各多少答曰方周一百二十八步圓周七十二步法曰立天元一為圓周減於相和二百步得丨為方周以自乘得丨為方周冪是十六箇方積也就分三之得為四十八假方田積于頭再立天元圓周以自之又就分四之得元亦為四十八假圓田積併入頭位得為四十八假如積數寄左然後列真積一千四百五十六步就分四十八之得六萬九千八百八十八步與左相消得開平方得七十二步為圓田徑也減共步則方周依條假求之三假和步冪內減四十八之田積為實六之和步為從七益隅義曰減時減過一箇方六之從步內又欠六箇方共虛了七步故以為益隅第二十七問今有方圓田各一假共計積二千二百八十六步只云方面不及圓徑一十二步圓依密率問面徑各多少答曰方面三十步圓徑四十二步法曰立天元一為方面加不及一十二步得丨為圓徑以自之得丨為圓徑冪以一十一之得下式便為十四箇圓積於頭再立天元方面以自之又就分一十四之得元為十四箇方積也併又頭位得為十四假如積數寄左然後列真積二千二百八十六步就分一十四之得三萬二千四步與左相消得下式平方開之得三十步即方面也加不及一十二步即圓徑也依條假求之十四之真積內減一十一假差步冪為實二十二之差步為從差步即不及步二十五步常法義曰十四之積步內有一十一箇圓徑方與一十四箇方面方此式與第二十五問略同其一十一箇圓徑冪有十一箇方正當十一假之其數自見也第二十八問今有方圓田各一假共計積二千二百八十六步只云方周不及圓周一十二步問周各若干圓依密率答曰方周一百二十步圓周一百三十二步法曰立天元一為方周加不及步一十二得太丨為圓周以自之得丨又以一十四乘之得為一百七十六假密率積于頭再立天元方周以自之為方積一十六假又就分一十一之得元便為一百七十六假方田積併入頭位得下式為一百七十六假如積數寄左然後列真積二千二百八十六步就分以一百七十六乘之得四十萬二千三百三十六步與左相消得開平方得一百二十步為方周加不及步即圓周也依條假求之一百七十六之真積內減十四假差步冪為方實二十八之差步為從二十五常法義曰所減數乃十四假不及步冪也第二十九問今有方圓田各一假共計積一千四百四十三步只云圓周大如方周方圓周併得一百九十八步問二周各多少答曰方周九十六步圓周一百二步法曰立天元一為方周減共步一百九十八得丨為圓周以自增乘得丨為十二假圓田積四之得下為四十八假圓田積于頭再立天元方周以自之為十六假方田積又就分三之得元便為四十八假方田積併入頭位得為四十八假如積寄左然後列真積一千四百四十三步就分母以四十八乘之得六萬九千二百六十四與左相消得開平方得九十六步為方周也減於併數見圓周也依條假求之四假共步冪內減四十八之積為實八之共步為從七益隅義曰八之從內合虛八箇方今見有一箇方外只虛了七步方也第三十問今有圓田二假一假依圓三徑一率一假依密率共積六百六十一步只云二徑共相和得四十步問二徑各數答曰密徑一十四步古徑二十六步法曰立天元一為密徑以減相和四十步得丨為古徑以自之得下丨為古徑冪以三因之得合以四約之又就分母七之得為二十八假古圓積於頭再立天元密圓徑以自之又二十二之得元為二十八假密圓積也併入頭位得為二十八假如積寄左然後列真積六百六十一步就分二十八乘之得一萬八千五百八步與左相消得平方開之得一十四步為密圓徑以減和步即古徑也依條假求之二十一假和步冪內減二十八之田積為實四十二之和步為從四十三步虛常法義曰其二十八之田積內有古積二十一假密積二十二假元初減時減過一假又併從步內合除之數計虛却四十三箇方也第三十一問今有直田一假中心有圓池水占之外計地三千九百二十四步只云從外田角斜通內池徑七十一步外田闊不及長九十四步問三事各多少答曰圓池徑一十二步田長一百二十六步闊三十二步法曰立天元一為內圓徑以減倍通步一百四十二步得丨為直田斜以自乘得丨為兩假直田並一假較冪于頭再置闊不及長九十四步自之得八千八百三十六步以減頭位得丨為兩假直積數寄左再立天元圓徑以自之為圓徑冪三之二而一得元為兩箇池積數加入二之見積七千八百四十八步得亦為二假真積與寄左相消得平方開之得一十二步為圓徑也依條假求之倍通步為冪內減二之見積一箇較冪為實四之通步為從半步常法義曰從步內少一箇圓徑冪其漏下底二箇圓池共一步半今將一步補了從步合除之數外猶剩半步故以為常法第三十二問今有圓田一假中心直池水占之外計地五千三百二十四步只云併內池長闊與外圓徑等內池闊不及長三十六步問三事各多少答曰外田徑一百步內池長六十八步濶三十二步法曰立天元一為外圓徑以自乘三因四而一得元為圓積內減了見積五千三百二十四步餘得為水池直積也以四之得為四假水池直積寄左再立天元圓徑命為直積和步以自之得元丨為四積一較冪內減了池較冪一千二百九十六步得丨亦為四假池積與左相消得平方開之得一百步為外圓徑也闊不及長減圓徑餘折半見闊却以不及步加之即長也依條假求之四積內減較冪為實從空二步常法義曰四之圓積內有四箇水池又于見積內減了一箇池較冪相併恰是一箇和冪也今來池和與圓等共和冪恰是一箇圓徑冪也除外有兩箇方第三十三問今有圓田一假中心有直池水占之外計地七千三百步只云併內池長濶少田徑五十五步闊不及長三十五步問三事各多少答曰田徑一百步內池長四十步闊五步法曰立天元一為外圓徑自之得數又三之四而一得元為外圓田積也減見積七千三百步得為內池積也以四之得為四假池積寄左再立天元圓徑內減少徑步五十五得丨為池和也以自之得丨為四池一較冪內減池較冪一千二百二十五步得丨亦為四池積也與左相消得平方開之得一百步為圓徑也內減少徑即水池和步內加一差即為二長若減一差即為二闊也依條假求之四之積步內減池較冪却加入少徑冪為實二之少徑為從二步常法義曰四池并所減底箇較冪恰是一箇和自之舊術下積步四之於頭位又以少徑步自乘加頭位內却減闊不及長冪餘折半為實用少徑為從一步常法第三十四問今有圓田一假內有直池水占之外計地六千步只云從內池四角斜至田楞各一十七步半其池闊不及長三十五步問三事各若干答曰圓田徑一百步池長六十步濶二十五步法曰立天元一為外徑內減倍至步三十五步得丨為池斜以自之得丨為二積一較冪於頭又列闊不及長三十五步以自之得減頭位得為四池積寄左又立天元圓徑以自之又三之便為四假圓積內減四之見積二萬四千步得下式亦為四箇池積也與左相消得丨平方開得一百步為外田圓徑也圓徑自之又三之四而一內減見積餘為內池積也又用差步為從開方見池闊也依條假求之四之見積內加八假至步冪却減兩假闊不及長冪為實八之至步為從一步常法義曰四箇圓積內有四箇虛直池於積內又減了兩假闊不及長冪合成兩箇池斜冪也八箇從步內貼入八箇斜至步冪其數與圓徑正相應也外恰有一步方第三十五問今有圓田一假中心有直池水占之外計地五千七百六十步只云從外田東南楞至內池西北角通斜一百一十三步其內池闊不及長三十四步問三事各多少答曰外圓田徑一百二十步池長九十步闊五十六步法曰立天元一為角斜加通步得丨為圓徑以自之得丨為圓徑冪又三之得為四假圓田積也內減了四之見積二萬三千四十步得為四假內直池寄左再立天元角斜以減通步為池斜以自之得丨為池斜冪於頭又列長平按平即闊較三十四步以自之得一千一百五十六步以減頭位餘丨為二池積也又倍之得亦為四直池與左相消得丨開平方得七步為角斜也依條假求之四之積步內減兩假闊不及長冪又減一假通步冪為實十之通步為從一步隅法義曰兩箇較冪併四箇池積該兩箇斜冪也於四箇圓積內減此兩箇斜冪外更減了一箇通步冪恰是十之從外有一步常法也第三十六問今有圓田一假中心有直池水占之外計地六千步只云從內池四角斜至田楞各一十七步半其內池長闊共相和得八十五步問三事各多少答曰外田徑一百步池長六十步闊二十五步法曰立天元一為內池斜加入倍至步三十五得丨為外圓徑以自之又三之得為四假圓積也內減四之見積二萬四千步得下為四箇池積寄左乃置內池和八十五步以自之得為四積一較冪於頭再立天元內池斜以自之得元丨為二池積一較冪以減於頭位得丨為二池積也又倍之得亦為四池積與左相消得平方開得六十五步為內池斜加倍至步即圓徑也徑自之又三之四而一內減去田積餘實以和步為從一虛隅開平方見闊也依條假求之四之積步內加兩假和步冪却減十二假至步冪為實十二之至步為從五步常法義曰所加兩箇和冪該八積二較冪數內元有四虛池外有四積二較冪其實只是添了兩箇池斜冪也於四圓積內除從步占外元有三箇方今又加入兩箇池斜冪共得五步故五為常法第三十七問今有圓田一假中心有直池水占之外計地九千一百二十步只云從外田楞通內池斜一百一十六步半其內池長闊共相和得一百二十七步問三事各多少答曰圓田徑一百二十步池長一百一十二步闊一十五步法曰立天元一為角斜加通步一百一十六步半步丨為圓徑以自之得丨為圓徑冪以三之得為四假圓田也內減四之見積三萬六千四百八十步得步為四假內池積寄左再立天元角斜以減通步得步丨為內池斜以自乘得步丨為二積一較冪於頭又列池和步以自乘得內減頭位餘得元丨為二池積也倍之得下步亦為四池積與左相消得步平方開之得三步半為角斜也加通步為圓徑依條假求之四之積步內加兩假和步冪却減五箇通步冪餘為實二之通步為從五步為常法義曰兩箇和冪內虛了四池只是兩箇池斜冪今將兩箇池斜冪減於兩箇通步冪止有二甲二乙所占之地今又將二甲二乙及三假通步冪併以減於四之見積外實在兩箇通步從五箇方也第三十八問今有水旱田各一假共計積二千六百二十五步只云水田長闊共一百步其旱地闊不及長三十五步而不及水地闊十步問水旱地長闊各若干答曰水地長七十五步闊二十五步旱地長五十步闊一十五步法曰立天元一為旱地闊加旱闊不及水闊一十步得丨為水地闊以減水田長闊共一百步得丨為水田長也以水田長闊相乘得丨為水田積于頭再置天元旱地闊加不及三十五步得兀丨為旱田長也以天元乘之得太丨為旱田積也加入頭位得為一假如積寄左然後列真積二千六百二十五步與左相消得下法上實如法得一十五步為旱田闊也加闊不及長三十五步為旱田長也又于旱闊內加不及水地闊一十步為水地闊也以水地闊減於水田長闊一百步餘為水田長也依條假求之以水田共步乘二闊差於頭位以二闊差冪減頭位得數復以減於田積為實列水田共步加入旱地長闊差內却減兩箇二闊差為法義曰其水田闊二十五步為法內元多一箇水旱二闊差數又積步內減了一假旱闊為長二闊差為平底直積是又虛了一箇水旱二闊差數故於法內減去兩箇闊差也按此條圗與義不合蓋傳寫之誤也今仍存舊式另擬圖義于後以明之義曰水田長闊共步乘二闊差內減差冪即附水田周一磬折積也以減共積餘同旱闊之兩長方共積為實其水田長闊比原數各減一闊差于此長闊和內加旱田長闊較即兩長方之共長故為法即得旱田闊也第三十九問今有直田一假內有圓池水占之外計地三十九畝一分半只云從田兩頭至池各一百五步兩畔至池各九步問三事各多少答曰田長二百三十四步闊四十二步池徑二十四步法曰立天元一為內池徑加二之邊至一十八步得丨為田闊又置天元池徑加二之頭至二百一十步得丨為田長長闊相乘得下式丨為直田積於頭再置天元徑以自之又三之四而一得為內池積以減頭位得為一假如積數寄左然後列真積三十九畝一分半以畝法通之得九千三百九十六步與左相消得開平方得二十四步為內池徑也加二之邉至步為田闊若加二之頭至步即田長依條假求之倍頭至步與倍邊步相乘以減田積為實併一頭一邊步又倍之為從二分半常法義曰此問與第一問條假頗同但所減者為四箇小池積按池當作隅第四十問今有直田一假中心有圓池水占之外計地四畝五十三步只云外田長平和得七十六步太半步從田四角去池楞各一十八步問外田水池徑各多少答曰田長五十步闊二十六步太池徑二十步太法曰立天元一為內池徑加倍角至步三十六得丨為直田斜以自之得丨為田斜冪便是二積一較冪也又九之得下式為十八積九較冪也寄左列和步七十六步太按太即三分步之二通分內子得以自之得五萬二千九百步為九假和冪於頭為九假和冪者元帶三分母以自之得九也此九假和冪該三十六直積九箇較冪也又置天元圓徑以自之又三之四而一得元為一假圓積也加入見積一千一十三步得共為直積一假又十八之得為十八假直積以減頭位得亦為九假田斜冪與左相消得合以平方開之今不可開按不可開者謂廉隅數多而得數又不能盡也先以隅法二十二步半乘實二萬三千單二步得五十一萬七千五百四十五步正為實元從六百四十八負依舊為從一益隅平方開之得四百六十五步以元隅二十二步半約之得二十步三分之二為內池徑也加倍至步為田斜以自之為二積一較冪又二之於頭位以和步冪減頭位餘以平方開之即田較也加入和步折半為長若減於和步折半為闊也依條假求之列相和步自乘為冪內減倍積及四假至步冪為實四之至步為從二步半常法義曰和步冪內減了二直積只有一假斜冪也減二直積時漏下兩箇圓池該一步半又正有一步共計二步半常法也求較者先置池徑二十步太帶三分母便為三箇徑也加入六之至步一百八步得便為三箇田斜也以自之得為九假斜冪便是十八箇直積九箇較冪倍之得為三十六假田積一十八假較冪於頭再置和步七十六步太亦帶三分母便為三箇和也以自之得為九假和冪便是三十六直積九較冪也以減頭位餘為九假較冪也平方開之得七十步以三約之得二十三步三分步之一為田較也欲見田長闊及斜者準此法求之又法求圓池徑者立天元一為三箇內池徑以自之得元丨為九假池徑冪便是十二假圓積也加十二假見積得丨為十二假直積又身外加五得為十八假直田積于頭又列和步七十六步太通分內子得二百三十自之得為和冪九假便是直積三十六假較冪九假也內減頭位得下式為九假斜冪數寄左再置天元圓徑加六之角至步一百八步得丨為三箇田斜以自之得丨亦為九假斜冪也與左相消得開平方得六十二步為三箇圓池徑也以三約之得一箇圓徑二十步三分之二此名之分天元一術前法乃連枝同體術也按分天元一術即天元一內帶分求之得數而後約之連枝同體術即通分開方得數而後約之皆兼通分之法也第四十一問今有直田一假中心有圓池水占之外計地三千九百二十四步只云從外田角斜通池徑七十一步外田長闊相和得一百五十八步問三事各多少答曰圓徑十二步田長一百二十六步闊三十二步法曰立天元一為內圓徑以減倍通步一百四十二步得丨為田斜以自之得丨為二積一較冪於頭又立和步一百五十八步以自之得為四積一較冪以減頭位得丨為二直積寄左又立天元池徑以自之又三之二而一得元為兩箇池積也加入二之見積七千八百四十八步得亦為一假直積與左相消得平方開之得一十二步為內池徑也依條假求之二之積步內加四假通步冪却減一假和步冪為實四之通步為從二步半虛常法義曰減一和步冪是減四積一較冪也四之通步冪內減了一箇斜冪却又減過二箇直積故二之積步加之從內欠一箇方減二積時漏下二箇圓池又該欠一箇半方共欠二步半虛常法也第四十二問今有直田一假中心有圓池水占之外計地一萬八百步只云從外田角至水池楞六十五步其外田闊不及長七十步問二事各多少答曰田長一百五十步闊八十步圓池徑四十步法曰立天元一為內池徑加倍至一百三十步得丨為田斜以自之得丨為田斜冪於頭又置田較七十步以自之得為較冪以減頭位得丨為二田積寄左再立天元池徑以自之身外加五得元為兩箇池積也加二之見積二萬一千六百步亦為二直積與左相消得開平方得四十步即池徑也以徑自之三之四而一加入見積為實以闊不及長為從開方得田闊依條假求之二之田積內加較冪却減四假至步冪為實四之至步為從半步虛常法義曰二積內加一箇較冪恰補就一箇斜冪也其二積內有兩箇圓池是元虛了一步半方也于積內却實有一步除外止虛了半步也益古演段卷中
