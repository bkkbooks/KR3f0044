body:
  text: 益古演叚卷下元李冶撰第四十三問今有圓田三叚一依古法一依宻率一依徽率共計地二十畆五十二步一百七十五分步之二十三只云宻徑多於古徑九步徽徑多於宻徑九步問三徑各多少答曰古徑三十六歩宻徑四十五步徽徑五十四步法曰立天元一為古徑加多九步得丨為宻徑以自之得下丨為宻徑冪又以十一乗之得為十四叚宻圓積於頭又立天元古徑加二之多步一十八步得丨為徽徑以自之得丨為徽徑冪也又以一百五十七乗之得為二百叚徽圓積於中按徽率周一百五十七徑五十徑乗周四歸為圓冪今以徑冪乗周當以徑五十除之再四歸之為圓冪不除便為五十乗之又四乗之之二百圓冪也又置天元古徑以自之又三之得元為四叚古圓積於下乃求三積齊同分母而併之先以分母一萬七千五百按此即十四除二十四萬五十之數乗十四叚宻圓積得為二十四萬五千叚宻圓積於頭位次以分母一千二百二十五乗二百叚徽積得為二十四萬五千叚徽積於中位次以分母六萬一千二百五十乗四叚古積得為二十四萬五千叚古積於下位三位相併得為二十四萬五千叚如積數寄左然後列見積通分内子得八十四萬九千一百二十三就分以一千四百乗之得一十一億八千八百七十七萬二千二百與左相消得下式平方開之得三十六步為方徑也各加多步見徽宻二徑也義曰所以齊同於二十四萬五千叚者以元母一百七十五乗一千四百得此數依條叚求之以一千四百乗田積於頭位置徽徑多古徑自之為冪又以一千九十九按置一千四百分以徽圓冪率一百五十七乗之方冪率二百除之即得乗之減頭位續置宻徑多古徑自之為冪又以一千一百按置冪十一千四百分以宻率圓乗之方冪十四除之即得乗之復減頭位餘為實又倍徽徑多古徑以千九十九乗之為徽從又倍宻徑多古徑以一千一百乗之為宻從併二從得五萬九千三百六十四為從法亷常置三千二百四十九義曰以一千四百乗積者取其三率皆可以除之也齊同分母湏至於二十四萬五千叚者葢以分母一百七十五元乗積數一千四百此二數相乗得二十四萬五千也此問求真積實數古徑三十六得積九百七十二步宻徑四十五步得積一千五百九十一步一十四分步之一徽徑五十四步得積二千二百八十九步二百分步之一十二併三積全步四千八百五十二步外宻零一十四分步之一徽零二百分步之一十二以上維乗下位宻子得二百分八徽子得一百六十分相併得三百六十八分為子實又上二位相乗得二千八百分為母法子母俱以十六約之為一百七十五分步之二十三一千四百乗田積來厯盖只就宻率上定之也置一千四百在地以宻率十一之如十四而一為一千一百積若以古率三之四而一則得一千五十積若以徽率一百五十七乗之如二百而一得一千九十九積所以用一千四百乗積者縁古法四徽法二百皆可以除之也求三積齊同分母元分母數一百七十五元乗積數一千四百此二數相乗二十四萬五千即大分母也三積總率皆齊同於此既得此齊同分母乃各以先求到叚數約之徽率得一千二百二十五宻率得一萬七千五百古率得六萬一千二百五十故反以乗叚數皆齊同於二十四萬五千也按條叚分母數簡於前法者用舊術也然各分母之數猶有可省者盖衆數取分母數必得最小者方爲確凖其義見秦九韶數學九章大衍術中今附其法於後以發明前法所未盡者法列四數先以元母一百七十五與宻方率十四相度得度盡二數之數為七次以二數相乗以度盡數除之得三百五十為二數總母又以二數總母與徽方率數相度得度盡二數之數為五十以二數相乗度盡數除之得一千四百為三數總母又以三數總母與古方率數相度則古方率四即為度盡二數之數二數相乗度盡數除之仍得一千四百即為四數總母然後以宻方率十四除之得一百為宻分母以徽方率二百除之得七為徽分母以古方率四除之得三百五十為古分母以元分母一百七十五除之得八為原積分母以此數與各叚冪積相乗除較原數所省多矣第四十四問今有梯田一叚長二百四十步並不知東西兩濶只云從東頭截長五十步計地三畆從西頭截長三十步計地五畆問二濶各多少答曰東頭元濶一十一步二分西頭元濶四十一步九分二釐法曰此問先湏求見兩頭各截之停廣求東截停廣者置東頭所截三畆之積七百二十步以截長五十步除之得一十四步四分為東截地之停廣也求西截停廣者置西頭所截五畆之積一千二百步以截長三十步除之得四十步為西頭所截停廣也乃立天元一為毎步之差以東頭截長五十步乗之折半得以減東停廣一十四步四分得分為東頭元小濶於上再置天元差步以西頭截長三十步乗之得折半得加入西頭停廣四十步得為西頭大濶也内減東頭小濶餘步為二濶總差也寄左再立天元毎步差以正長二百四十步乗之得亦為二濶總差與左相消得步下法上實如法而一得一分二釐八毫為毎步之差也置毎步之差以西頭截長三十步乗之得三步八分四釐折半得一步九分二釐加入西頭停廣四十步得四十一步九分二釐為西頭元大濶也又置毎步之差以東頭截長五十步乗之得六步四分折半得三步二分以減於東頭停廣一十四步四分餘一十一步二分為東頭元小濶也此問止求毎步之差更不湏以條叚明之舊術依法求得東停廣與西停廣數乃以二停廣相減餘以二百而一謂東截長五十步其停廣當二十五步餘去了二十五步也西截長三十步其停廣當一十五步餘去了一十五步也兩頭計去了四十步以減於正長二百四十步餘二百步所得為毎步之差乃副置半步之差左以東截長乗之以減東停廣餘為東元濶也右以西截長乗之以加西停廣併為西元濶也又法置一步之差以正長二百四十乗之所得為都濶差也以都濶差加於小頭濶則為大頭濶也第四十五問今有方田一叚中心有方田池占之外計地一畆只云從外田東南隅至内池西南隅一十三步問内外田方各多少答曰内池方七步外田方一十七步法曰立天元一為内池方以自乗倍之得元加入見積得寄左又列至步自之得一百六十九步又倍之得三百三十八步與左相消得開平方得七步即内池方也池方自之加入見積再開平方即外田方面也依條叚求之只據前式便是更不湏重畫也只是将見積打作四叚小直田以池面為較以外田方面為和以斜至步為弦然此問惟是其池正在方田中心可依此法求之若稍有偏側則不能用也舊術列去角步自乗為二位頭位減半田積開平方見内池面下位加半田積開平方見外田面也第四十六問今有方圓田各一叚共計積一百二十七步只云其方面大如圓徑圓徑穿方斜共得二十步問面徑各多少答曰方面一十步圓徑六步法曰立天元一為圓徑減穿步得丨為方斜以自之得丨為方斜冪於頭再置天元圓徑以自之又以一步四分七釐乗之得步為展起圓田也併入頭位得步為展數如積一叚寄左然後列見積一百二十七步兩度下加四兩度下加四止是以一步九分六釐乗之也以一步九分六釐乗之者變方田為斜田也得二百四十八步九分二釐與左相消得下式開平方得六步即圓徑也以徑減穿步即方斜也依條叚求之穿步冪内減去展起見積為實二之穿步為從二步四分七釐虛隅義曰下式乃展起之圓積也亦俱是減數也此數該一步四分七釐之方又從步内疊出一步虚隅計得二步四分七釐常法也舊術曰以一步九分六釐乗田積為頭位又列穿步自乗内減去頭位餘為實倍穿歩為從亷常置二歩四分七釐減從開方第四十七問今有直田一叚中心有小方池結角占之外計地二千七十九步只云從田二頭至池角二十一步半兩邉至池角七步半問三事各多少答曰長六十四步濶三十六步池方一十五步法曰立天元一為内方面身外加四又加二之頭至步四十三得為田長也又置池方面身外加四又加入二之邉至步一十五得為田濶也長濶相乗得下式為直田積於頭又置天元池方面以自之得元丨為内方池以減頭位得為如積一叚寄左然後列見積二千七十九步與左相消得開平方得一十五步即内池方面也方面外加四副二位若加兩頭至池步見長若加兩邉至池步即見濶也依條叚求之積步内減四叚邉至與頭至步相乗數為實併至頭至步倍之又身外加四為從九分六釐常法義曰水池外有九分六釐常法從步皆加四者盖於斜上求方面也第四十八問今有方田一叚内有直池水占之外有地三百四十步只云其池廣不及長四步又云從田楞通池長一十五步問三事各多少答曰田方二十步内池長一十步廣六步法曰立天元一為池長減於倍通步丨為田方面以自之得丨為田方積於頭再置天元池長内減較四步丨為池濶以天元乗之得丨為直池積以減頭位得為如積一叚寄左然後列直積三百四十步與左相消得下法上實如法而一得一十步即池長也以長減於倍通步即方田面也依條叚求之四叚通步冪内減田積為實四之通步内減池較為法如法得池長義曰四之通步為法内欠一箇池長冪却用所漏之池補之猶差一池較為法合除之數也既於實積内虚了此數故作法時於四之通步内減去一數也第四十九問今有方田一叚内有小方池結角占之外計地一萬八百步只云從外田楞至内池角各一十八步問内外方各多少答曰外田方一百二十步内池方六十步法曰立天元一為内方面身外加四又加倍至步三十六得為田方面以自乗得為外方積於頭再置天元内方面以自之得元丨為内池積也以減頭位得為如積一叚寄左然後列真積一萬八百步與左相消得開平方得六十步為内池方面也内方面身外加四又加倍至步即方面也依條叚求之見積内減四叚至步冪為實四之至步身外加四為從九分六釐常法義曰從步内加四者是於一箇方面上求第五十問今有方田一叚自有小方池結角占之外計地九千三百七十五步只云從外方角至内池面各五十七步半問内外方各多少答曰外田方一百步内池方二十五步法曰立天元一為内方面加倍至步一百一十五步得丨為外田斜以自之得丨為所展方積於頭再置天元内池面以自之得元丨為内池積又就分以一步九分六釐乗之得下元亦為所展之池積也以減頭位得為一叚所展如積寄左然後列真積九千三百七十五步以一步九分六釐乗之得一萬八千三百七十五與左相消得開平方得二十五步即内方面也依條叚求之展積内減四叚至步冪為實四之至步為從九分六釐虚常法義曰展積時其池亦展得虚了九分六釐也第五十一問今有方田一叚内有小方池結角占之外計地四十五畆只云從外田南邉斜通池北角一百二步問内外方各多少答曰外田方一百二十步内池方六十步法曰立天元一為内方面身外加四為池斜以減於倍通步二百四步得為外方面以自之得為方田積於頭又置天元内池面以自之得下元丨為内方池也以内方池減頭位得為如積一叚寄左然後列真積一萬八百步與左相消得平方開之得六十步為池方面也依條叚求之四叚通步冪内減見積為實四之通步加四為從九分六釐虚隅法義曰從步身外加四者蓋是於池斜上求池面也舊術曰倍通步自乗以田積減之餘折半為實倍通步加四為從亷常置四分八釐減從開方見内方面第五十二問今有方田一叚内有方池結角占之外計地三十九畆零一十五步只云從田東南角至内池西北面八十二步半問内外方面各多少答曰外田方面一百步内池方面二十五步法曰立天元一為内方面減於倍通步一百六十五步得丨為外田斜也以自之得丨為所展外田積於頭再置天元池方面以自之為方池積又就分以一步九分六釐乗之得元為所展方池積也以減頭位得為展起底如積一叚寄左然後列真積三十九畆一十五步通納得九千三百七十五步又就所展分母一步九分六釐乗之得一萬八千三百七十五步與左相消得平方開之得二十五步即内池面也以池面減於倍通步又身外去四即外方面也依條叚求之四叚通步冪内減展積為實四之通步為從九分六釐常法義曰元以展積減四叚通步冪時漏下一步九分六釐池積今来於從步内疊用了一個方外剰九分六釐第五十三問今有方田一叚内有直池結角占之外計地八百五十步只云從田角通水長三十七步通水濶三十二步問三事各數答曰池長二十五步濶一十五步外田方三十五步法曰立天元一為内池長減於倍通步七十四步得丨為外田斜也以自之得丨為所展外田積於頭再置倍通長七十四步内減倍通濶六十四步餘一十步乃池長濶差也或直以通長通濶相減於者倍之亦為長濶差也再置天元池長内減長濶差得丨為濶也以天元長乗之得丨為直池積也又就分以一步九分六釐乗之得為展起底直池積也以減頭位得下式為所展如積一叚寄左然後列真積八百五十步就分以一步九分六釐乗之得一千六百六十六步與左相消得開平方得二十五步為内池長也以減倍通長步又身外去四即外田方面也依條叚求之四叚通長冪内減展積為實四之通長於頭以一步九分六釐乗長濶差以減頭位為從九分六釐常法義曰據從步合用之積於疊起處少了一方今将減積時漏下所展水池補了一甲之地若更得一乙之地則共補成一步九分六釐之地方也按原圖仍用正方今易為直方庶為簡明今不可補故於從步内減去所展差步便是於從法合用之積内借了一乙之地恰補就一步九分六釐之方也除補了疊起的一步方外猶剰九分六釐故以之爲常法也第五十四問今有方田一叚内有直池結角占之外計地一千一百五十步只云從田角至水兩頭各一十四步至水兩邉各一十九步問三事各多少答曰方四十五步池長三十五步濶二十五步法曰立天元一爲池濶加二之邉至步三十八得丨為外田斜以自之得丨為所展外田積於頭二之邉至步内減二之頭至步餘一十步為池長濶差也再置天元池濶加差一十步得丨為池長也用天元池濶乗之得丨為直池積也又就分以一步九分六釐乗之得步為所展之池積也以減頭位得為所展如積一叚寄左然後列真積一千一百五十步以一步九分六釐乗之得二千二百五十五十四步與左相消得開平方得二十五步為池濶也又加二之邉至步又身外去四即外方面也依條叚求之展積内減四叚邉至步冪為實四之邉至步於頭以一步九分六釐乗長濶差減頭位餘為從九分六釐虚常法義曰所展池積内将四叚紅按原圖應減者以紅色别之積恰補作九分六釐虚常法其兩箇所占半差於減從時又以一步九分六釐乗之者葢欲合身外加四所乗積也按展積義多未備此條尤略今具圖説以詳之義曰外四隅方所減之四至冪也中十字積為實則池濶為隅四之至步為從也附直池外斜方展池積也平分上下二尖形附於左右二尖形外成一原池濶乗展池正長之直方展池正長為原池長之一步九分六釐十字積與展池積之較為實是前從隅内應少原池長之一步九分六釐又為少原池長濶較之一步九分六釐併原池濶之一步九分六釐故展較減前從以為從展隅反減前隅為虚隅也第五十五問今有圓田一叚内有圓池水占之外計地二十三畆一分只云内外周徑共相和得四百二十四步問内外周徑各多少圖依宻率答曰外周二百八十六步徑九十一步内周一百一十步徑三十五步實徑二十八步法曰立天元為實徑以減相和步四百二十四得丨為内外周共步用天元實徑乗之得丨為如積兩叚寄左然後列二之真積一萬一千八十八步與左相消得丨開平方得二十八步為實徑也以徑步除田積於頭位又二十二乗徑步如七而一得數若加頭位即外周若減頭位即内周也義曰以徑步除田積所得乃半内周半外周共步也又據古率三箇實徑即是半箇外内周差步也縁此問係是宻率故以二十二乗徑以七約之也即得半差以加共步即是外周以減共步即是内周也又據古率三之實徑以加減共步者縁共步便三空徑三實徑共數也於此共數内加三實徑則恰是三箇大圓徑故為一箇外周也若共數内減去三實徑則正有三箇小圓徑故為一箇内周也今是宻率故先以二十二之七而一所以附就此數以求内外周也依條叚求之倍積步為實和步為從一益隅義曰以和步為從是於内外周數外又引出一步虚常法也第五十六問今有圓田一叚内有圓池水占之外計地二十三畆一分只云從外田通内池徑六十三步問同前答同前法曰立天元為實徑加通步六十三得丨為外田徑以自之得下丨為外圓徑冪又十一之得下式為十四叚外圓積於頭再置天元實徑以減通步得丨為内圓徑以自之得丨為内圓徑冪又十一之得為十四叚内圓積也以減頭位得下式步為十四叚如積寄左然後列真積二十三畆一分法通得五千五百四十四又就分一十四之得七萬七千六百一十六與左相消得下法上實如法而一得二十八步為實徑也以實徑加通步即外徑若減通步即内池徑也依條叚求之十四之積為實四十四之通步為法求得實徑此問難以為式强立此式以推之毎積之長乃三箇通步今十四之積合以四十二箇通步除之今用四十四之通步為法者縁宻率之周稍多於古率之周也假令古率七箇積即合用二十一箇通步為法若依宻率七箇積即合用二十二箇通步為法此問乃併十四之積為實是合用四十四箇通步為法也舊術曰二十二之通步如七而一為法除田積見徑又法倍通步自之又十一之於上以十四之積減上餘為實四十四之通步為法見池徑按條叚皆於立天元一内取出而於方圓變積之義或未暇深思故謂難以為式若以方環圓環解之固易易耳今増一圖義於後而舊術又法先求池徑更可互相發明因並附焉義曰圓冪率十一方冪率十四以十四乗圓環積便為十一方環積毎環為實徑乗通步之直方四故以十一方環積為實四十四通步為法即得實徑也義曰倍通步即大小徑併其冪内有大小徑冪各一大小徑相乗直方二内減圓環積所變之方環積餘小徑冪二大小徑相乗之直方二又為小徑乗大小徑併之直方二又為小徑乗通步之直方四故以十一倍之積較為實四十四之通步為法即得小徑也第五十七問今有圓田一叚内有直池水占之外計地八千七百四十四步只云兩頭至田楞各二十一步兩畔至田楞各四十五步問三事各數答曰田徑一百二十四步池長八十二步濶三十四歩法曰立天元一為池濶加二之畔至步得丨為外田徑以自之得丨為田徑冪以三之得爲四叚圓田積於頭二至歩相減餘二十四步又倍之得四十八步為池長濶差也再立天元池濶加差得丨爲池長以天元濶乗之得丨為池積又就分四之得為四叚直池積以減頭位得丨為如積四叚寄左然後列真積八千七百四十四步就分四之得三萬四千九百七十六步減頭位得丨平方開之得三十四步為池濶也依條叚求之四之見積内減十二叚畔至步冪為實十二之畔至步内減四箇長濶差餘為從一步虚常法義曰八處以紅誌之者共是從内所減之數也舊術曰四之積步於上又倍一畔步自乗三之減上餘為實又併一頭一畔步六之内減了長濶之差餘為從亷常置一步減從開方見池濶也第五十八問今有圓田一叚内有直池占之外計地一千五百八十七步只云從田楞通地長四十二步通地濶三十七步問三事各數答曰田徑五十四步池長三十步濶二十步法曰立天元一為内池長以減倍通長八十四步得丨為田徑以自之得丨為田徑冪以三之得為四叚圓田於頭再立天元一為池長内減長濶差得丨為池濶以天元一乗之得丨又就分四之得為四叚池積求長濶差者倍通長内減倍通濶即是也以減頭位得下式丨為四叚如積寄左然後列四之真積六千三百四十八步與左相消得丨開平方得三十步為内池長也以長減倍通長即田徑也依條叚求之十二之通步冪内減四之見積為實十二之通步内減四差為從一步常法義曰十二之從步内減去了三箇差又以三箇漏下池積補了疊起底三步虚方外猶剰一池更用一差減從併上所剰之一池恰補成一步常法也第五十九問今有二方夾一圓失却圓水占外有田積一十一畆五分五釐其方圓相去重重徑等問方圓各多少答曰内方面一十二步圓徑三十六步外方面六十步法曰立天元一為等數五之得為外方面自之得元為外方積於頭一次立天元一為等數以三之得為中圓徑以自之得元為圓徑冪又三之四而一得元為池積以減頭位得元為外田積内減了中圓積之數於次位一再立天元等數便為内方面以自之得元丨為内方積却加入次位得下為如積一叚寄左然後列真積一十一畆五分五釐以畆法通得二千七百七十二步與左相消得步下法上實如法而一得一百四十四步再開平方得一十二步為等數也便是内方面也三之為中圓徑五之為外方面此問更無條叚舊法以十九步二分半除積步得内方冪只是以一步推之也假令内方一步則圓徑三步外方面五步也於外方積二十五步之内減了中圓積六步七分半却加入内方積一步計得十九步二分半也第六十問今有二圓夾一方失却中方水占外有田積一十四畆一分七釐半其方圓相去重重徑等問方圓各幾何答曰内圓徑一十八步方面五十四步外圓徑九十步法曰立天元一為等數以五之為外圓徑以自之得元為外徑冪又三之四而一得為外田積於頭再立天元等數以三之為中方面又自之得元為中方冪以減頭位得元為外圓積内減了中方冪之數於次位又置天元等數便為内圓徑以自之得元丨為内徑冪又三之四而一得元為内圓積也却加入頭位得元為如積一叚寄左然後列真積一十四畆一分七釐半以畆法通得三千四百二步與左相消得下法上實如法而一得三百二十四步再開平方得一十八步為等數便是内圓徑也副置之三因為中方面五因為外圓徑也此問與前問意同更無條叚舊法以十步半除積步得内徑冪亦只是以一步推之假令内圓徑一步則是中方面三步外圓徑五步先置外圓積一十八步七分半内減了中方積九步却加内圓積七分半共得一十步半也第六十一問今有方田一叚靠西北隅有圓池水占之外計地九百二十五步只云從外田東南隅至池楞二十五步問面徑各多少答曰外田方面三十五步内池徑二十步法曰立天元一為内池徑身外加二得為池東南楞至田西北角也又加斜至步二十五步得為外田斜以自之得為田斜冪於頭再立天元圓徑以自之為冪又以一步四分七釐乗之得元為所展圓池積以減頭位得為所展如積一叚寄左初立天元身外加二者以方求斜合加四今求一半故加二也斜按加二係以方求半方半和之數也然後列真積九百二十五步就分以一步九分六釐乗之得一千八百一十三步與左相消得平方開得二十步為池徑也池徑外加二又添入斜至步却身外除四即外方面也依條叚求之展積内減斜至冪為實倍至步身外加二為從三釐虚常法減從開平方義曰於一方外虚了四分七釐從上帶了四分外虚七釐又於從上乗起四釐外猶虚三釐故以三釐為常法此圖内二分合畫作極細形状與四分七釐外圓邉正自相應今不應者但二分差濶耳所以畫作差濶之状者正欲易辯二分之數也按原圖式有附斜至冪外磬折形無附池徑冪外磬折形且二形相離皆𫝊本之誤也故義中所論亦不知其何指今訂補此圖二分不必加濶未嘗不易辨也第六十二問今有方田二叚靠西北隅有方池結角占外計地四畆一十五步只云從田東南隅斜至水方面一十九步問内外面各多少答曰外方面四十步内方面二十五步法曰立天元一為池方面身外加四八又加入斜至步一十九步得為外田斜也先将池斜變為方故加四後又将池方變為斜復合加四兩度加四於一步上合得一步九分六釐今求一半故身外止加四八也按方一步求斜身外加四又以斜為方求斜再身外加四是原方求再斜為身外加九六今求半方半再斜之和數故加四八也以自之得為外田斜冪於上再立天元一為池方面以自之又以四十九乗之如二十五而一得元為展起方池積以減上得為所展如積一叚寄左然後列真積四畆一十五步以畆法通内得九百七十五步又隨分以一步九分六釐乗之得一千九百一十一步與左相消得平方開得二十五步為内池方面也於此方面上兩次求斜合得一步九分六釐以除元方一步外有九分六釐半之則得四分八釐故此方面上加四八更加入斜至步為大方斜也以條叚求之展積内減至步冪為實二之至步以一步四分八釐乗之為從二分三釐四絲為常法義曰此一問其展起積時於一池之外虚了九分六釐却於一箇從步内加四分八釐二箇從步計加了九分六釐恰就了所展虗數除外有一叚四分自乗數該一分六釐於上又有兩叚四分乗八釐數按附自乗方外該六釐四毫於次又有一叚八釐自乗數按小方隅該六毫四絲於下三位併得二分三釐四絲此數係是於展積内實有之數故以常法也舊術以四十九乗田積如二十五而一于頭位以至水步自乗減頭位為實餘與條叚同按原圖式四分八釐方内按分釐數細分之因其數甚微又以分數釐數作等數分之終不免混淆今以亷隅線易之第六十三問今有大圓田一叚大小方田二叚其小方田内有圓池水占之外共計積六萬一千三百步只云小方田面至池楞三十步大方田面多於小方田面五十步其圓田徑又多於大方田面五十步問四事各多少答曰小方田面一百步池徑四十步大方田面一百五十步圓田徑二百步法曰立天元一為内池徑加二之至水六十步為小方面於小方面上又加入大小方面差五十步即大方面也於大方面上又加入大圓徑大方面差五十步即大圓徑也具圖於左一内圓徑太丨一小方面丨一大方面丨一大圓徑丨乃先置天元内圓徑以自之义三之得元為四叚圓池積於上又置小方面丨以自之得丨為小方積以四之得下式為四叚小方積於次又置大方面以自之得丨為大方積四之得為四叚大方積於下又置大圓徑下式丨以自之得丨為大圓徑冪以三之得下式為四叚大圓積於下位之次併下三位得下式於右以四池積元減於右得為如積四叚寄左然後列真積六萬一千三百步就分四之得二十四萬五千二百步與左相消得平方開之得四十步為内池徑也各加差步即各得方面與圓徑也依條叚求之四之田積於頭位内減三叚按落大圓徑三字多池徑冪又減四叚大方面多池徑冪又減十六叚至水步冪為實六之圓田多池徑步又八之大方田面多池徑步又十六之至水步三位併之得二千三百二十步為從法亷常置八步開平方義曰三叚圓徑冪乃四箇圓田積此數内有三箇方也其四叚大方田積内有四箇方也其四叚小方積毎箇圓池外餘二分半四池計餘一步方也三位上併帶八步方第六十四問今有方田一叚中心有環池水占之外計地四十七畆二百一十七步只云共環水内周不及外周七十二步又從田四角至水各五十步半問内外周及田方方各多少答曰外周一百八十步内周一百八步田方一百一十五步法曰立天元一為池内徑先以六除内外周差七十二步得一十二步為水徑倍之得二十四步加入天元池内徑得丨為池外徑又加倍至步一百一步得下式丨為外田斜以自之得丨為田斜冪於頭位再立天元池内徑加入二之水徑得丨為池外徑以自之得丨為外徑冪又以一步四分七釐乗之得下式步為展起底外圓積於次上再立天元一池内徑以自之元丨亦以一步四分七釐乗之得元步為展起底内圓積以減次上得步為所展底池積也以此池積減頭位得下式步丨為展起如積一叚寄左然後列真積四十七畆二百一十七步以畆法通納之得一萬一千四百九十七步又就分以一步九分六釐乗之得二萬二千五百三十四步一分二釐與左相消得下式步丨開平方得三十六步即池内徑也三之為内周又加差為外周置内徑加二之水徑又加倍至步為外方斜也置外方斜身外去四即外田方面也依條叚求之以一步九分六釐乗田積於頭位以水徑加至步以自之為冪又四之以減頭位又倍水徑自乗又以一步四分七釐乗之却加入頭位為實又水徑加至步四之於頭位又三之水徑以一步九分六釐乗之減頭位為從一步常法此問圖式有三第一式即所畵原様是也以一步九分六釐乗之變為斜冪其式如後右第二式也黒者為元問㸃者盡是展數恐糢糊難辯再具加減圖式於下更不見舊式也右第三式也其圓環以條叚命之只是一箇方環内取四分之三也却加入三叚展起底水徑冪外只有三叚展起底水徑乗内圓徑直田積也此係展環之虚數也今以至步並水徑共為從故於内却除去水徑之虚步也必湏以一步九分六釐乗水徑而去從者縁二停虚環並是展起之積故減從時将水徑亦展起而減之也按展水徑展内圓徑皆於原數身外加四今以内圓徑為不動則水徑必兩度加四故以一步九分六釐乗之也益古演段卷下
